# Netlify configuration for Chel Gaming Hockey League
# Static site (index.html at the root) + serverless functions (EA stats, screenshots, Discord).
# redeploy: re-trigger production publish (classic-site removal + server veto).

[build]
  publish = "."
  functions = "netlify/functions"

# The front-end calls /api/parse-screenshots; route that to the serverless function.
[[redirects]]
  from = "/api/parse-screenshots"
  to = "/.netlify/functions/parse-screenshots"
  status = 200

# The EA stats fetcher POSTs raw match data here (auth: x-ingest-key header).
[[redirects]]
  from = "/api/ingest-stats"
  to = "/.netlify/functions/ingest-stats"
  status = 200

# Sign-in-with-Discord doubles as a server invite: the front-end POSTs the user's
# Discord OAuth token here and the bot adds them to the guild.
[[redirects]]
  from = "/api/discord-join"
  to = "/.netlify/functions/discord-join"
  status = 200

# Security headers for the static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    # Inline JS/CSS need 'unsafe-inline'; the app also loads supabase-js (jsDelivr), Google Fonts, and
    # talks to Supabase over REST + realtime (wss). Images allow https (Discord avatars, Supabase logos).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://bzbuyclwdhmhdzujxeqd.supabase.co wss://bzbuyclwdhmhdzujxeqd.supabase.co; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'"
