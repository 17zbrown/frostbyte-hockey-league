name: EA stats fetcher

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 22-23 * * 3,4,5"
    - cron: "*/5 0-5 * * 4,5,6"
    

concurrency:
  group: ea-stats
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: tools/ea-fetcher
        run: npm install --no-audit --no-fund
      - name: Fetch EA matches and forward to ingest
        working-directory: tools/ea-fetcher
        env:
          INGEST_URL: "https://chelgaming.netlify.app/api/ingest-stats"
          SUPABASE_URL: "https://bzbuyclwdhmhdzujxeqd.supabase.co"
          PLATFORM: "common-gen5"
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: node fetch-and-post.mjs
