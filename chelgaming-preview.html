CG.ROUTES.schedule = function(param, qs){
  var lg = CG.lg;
  var fTeam = qs.team||"", fState = qs.state||"all", fWeek = qs.week||"";
  var head = CG.pageHead("Season 1 · schedule","Schedule & results","Every night, every final. All times Eastern. Game codes and lineups live on each matchup page.");
  var filters = '<div class="shell" style="margin-bottom:20px"><div class="filters">'+
    '<select id="fTeam" aria-label="Filter by club" style="max-width:220px"><option value="">All clubs</option>'+
      CG.TEAMS.map(function(t){ return '<option value="'+t.code+'"'+(fTeam===t.code?" selected":"")+'>'+esc(t.name)+'</option>'; }).join("")+'</select>'+
    '<div class="seg" role="group" aria-label="Game state">'+["all","final","upcoming"].map(function(s){
      return '<button data-state="'+s+'" class="'+(fState===s?"on":"")+'">'+s[0].toUpperCase()+s.slice(1)+'</button>'; }).join("")+'</div>'+
    '<select id="fWeek" aria-label="Filter by week" style="max-width:140px"><option value="">All weeks</option>'+
      Array.from({length:10},function(_,i){ return '<option value="'+(i+1)+'"'+(fWeek==String(i+1)?" selected":"")+'>Week '+(i+1)+'</option>'; }).join("")+'</select>'+
    '<button class="btn btn-ghost btn-sm" id="csvSched">'+CG.ic("dl",14)+'Export CSV</button>'+
  '</div></div>';
  var byWeek = {};
  lg.schedule.forEach(function(g){
    if (fTeam && g.home!==fTeam && g.away!==fTeam) return;
    if (fWeek && g.week!=+fWeek) return;
    var done = lg.results.some(function(r){ return r.id===g.id; });
    if (fState==="final" && !done) return;
    if (fState==="upcoming" && done) return;
    (byWeek[g.week]=byWeek[g.week]||[]).push(g);
  });
  var weeks = Object.keys(byWeek).map(Number).sort(function(a,b){ return a-b; });
  var body = weeks.length ? weeks.map(function(w){
    return '<div style="margin-bottom:30px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
      '<span class="eyebrow chr">Week '+w+'</span>'+(w===7?'<span class="chip chip-live"><span class="live-dot"></span>This week</span>':"")+'</div>'+
      '<div class="stack" style="gap:9px">'+byWeek[w].map(CG.gameCard).join("")+'</div></div>';
  }).join("") : '<div class="empty"><div class="e-art">'+CG.ic("cal",22)+'</div><b>No games match those filters</b><p>Clear a filter or two — the full 10-week slate lives here.</p></div>';
  return head + filters + '<div class="shell" style="padding-bottom:40px">'+body+'</div>';
};
CG.AFTER.schedule = function(param, qs){
  function nav(patch){
    var q = Object.assign({team:qs.team||"",state:qs.state||"all",week:qs.week||""}, patch);
    location.hash = "#/schedule?team="+q.team+"&state="+q.state+"&week="+q.week;
  }
  $("#fTeam").addEventListener("change", function(){ nav({team:this.value}); });
  $("#fWeek").addEventListener("change", function(){ nav({week:this.value}); });
  $$("[data-state]").forEach(function(b){ b.addEventListener("click", function(){ nav({state:this.getAttribute("data-state")}); }); });
  $("#csvSched").addEventListener("click", function(){
    var rows = [["Week","Date","Away","Home","Away score","Home score","OT"]];
    CG.lg.schedule.forEach(function(g){
      var r = CG.lg.results.find(function(x){ return x.id===g.id; });
      rows.push([g.week, CG.fmtDay(g.at), CG.TEAM[g.away].name, CG.TEAM[g.home].name,
        r?r.score[g.away]:"", r?r.score[g.home]:"", r?(r.ot?"Y":"N"):""]);
    });
    CG.exportCSV("cghl-schedule.csv", rows);
  });
};

CG.ROUTES.standings = function(param, qs){

/* Editorial one-liner computed from live results — always factually current. */
CG.teamLine = function(code){
  var lg = CG.lg, t = CG.TEAM[code], s = lg.teams[code];
  var div = CG.standings(lg, t.div);
  var rank = div.findIndex(function(r){ return r.code===code; }) + 1;
  var pos = rank===1 ? "Top of the "+t.div : rank===div.length ? "Bottom of the "+t.div : ["","","Second","Third"][rank]+" in the "+t.div;
  var sn = parseInt(s.streak.slice(1),10)||0;
  var flavor;
  if (s.streak[0]==="W" && sn>=3) flavor = "winners of "+sn+" straight";
  else if (s.streak[0]==="L" && sn>=3) flavor = "trying to snap a "+sn+"-game skid";
  else if (s.diff >= 15) flavor = "a "+(s.diff>0?"+":"")+s.diff+" goal differential doing the talking";
  else if (s.diff <= -15) flavor = "chasing a "+s.diff+" goal differential";
  else flavor = s.gf+" goals for, "+s.ga+" against";
  return pos+" at "+s.w+"-"+s.l+"-"+s.otl+" — "+flavor+".";
};

      (archived?'':'<div style="text-align:center"><span class="ovrbox" style="min-width:64px;height:52px;font-size:26px">'+lg.teamRatings[code].ovr+'</span>'+
        '<span class="caption" style="display:block;margin-top:6px;color:var(--on-ink-dim)">Team overall</span></div>')+'</div>'+

      CG.seasonPicker(seasonKey)+
      (archived?'<span class="chip chip-warn">Archived season — final, read-only</span>':'<span class="chip chip-win">Live — updates after every final</span>')+
    '</div>'+
  '</div></section>';

        : '<div class="card" style="margin-top:18px"><div class="card-h"><h3>Overall rating breakdown</h3><span class="chip">Formula v1 · configurable</span></div><div class="card-b">'+
      Object.keys(lg.teamRatings[code].parts).map(function(k){

      }).join("")+
      '<p class="caption" style="margin-top:10px">Team overall blends record, goal differential, goaltending, roster depth, and recent form. The commissioner can re-weight the formula in the Control Center — every number traces to real results.</p></div></div>');
  }
  if (tab==="moves" && archived){
    body += '<div class="card"><div class="empty"><div class="e-art">'+CG.ic("swap",22)+'</div><b>No transactions in '+esc(SD.label)+'</b><p>Rosters were frozen for the exhibition slate; league transactions began with Season 1.</p></div></div>';

  else if (tab==="moves"){

        '<div class="empty"><b>No transactions</b><p>Roster moves and call-ups will appear here when they happen.</p></div>')+'</div>'+
      '<div class="card"><div class="card-h"><h3>Discipline</h3></div>'+
      (sus.length?sus.map(function(x){ var p = CG.playerById(lg,x.playerId);
        return '<div class="notif" style="cursor:default"><span class="nf-ic" style="color:var(--red)">'+CG.ic("flag",15)+'</span><span><b>'+esc(p.tag)+' — '+x.games+'-game suspension ('+x.status+')</b><p>'+esc(x.reason)+'</p></span><span class="nf-t">'+CG.fmtDate(x.issued)+'</span></div>'; }).join(""):
        '<div class="empty"><b>Clean sheet</b><p>No suspensions or warnings on record for this club.</p></div>')+'</div></div>';
  }
  if (tab==="honors" && archived){
    body += '<div class="card"><div class="empty"><div class="e-art">'+CG.ic("trophy",22)+'</div><b>No honors in '+esc(SD.label)+'</b><p>Weekly hardware began with Season 1 — exhibition games didn’t award stars or Players of the Week.</p></div></div>';
  }
  else if (tab==="honors"){
    var wins = lg.potw.filter(function(w){ return CG.playerById(lg,w.skater).team===code || CG.playerById(lg,w.goalie).team===code; });
    body += wins.length ? '<div class="grid g3">'+wins.map(function(w){
      var p = CG.playerById(lg, CG.playerById(lg,w.skater).team===code ? w.skater : w.goalie);
      return '<div class="card raise" data-go="'+CG.playerRoute(p)+'"><div class="card-b" style="display:flex;gap:12px;align-items:center">'+
        CG.crest(code,34)+'<div><span class="chip chip-chrome">Week '+w.week+' POTW</span><b style="display:block;font-family:var(--f-disp);margin-top:6px">'+esc(p.tag)+'</b></div></div></div>';
    }).join("")+'</div>' : '<div class="card"><div class="empty"><div class="e-art">'+CG.ic("trophy",22)+'</div><b>No hardware yet</b><p>Weekly honors and season awards land here once this club starts collecting them.</p></div></div>';
  }
  body += '</div>';
  return head + tabs + body;
};

  var head = CG.pageHead("Player directory","Every skater. Every tendy.","96 rostered players across eight clubs. Ratings update nightly from real box scores.");

    '<input type="search" id="pQ" placeholder="Search gamertag…" value="'+esc(qs.q||"")+'" style="max-width:230px" aria-label="Search players">'+
    '<select id="pTeam" style="max-width:200px" aria-label="Filter by club"><option value="">All clubs</option>'+CG.TEAMS.map(function(t){ return '<option value="'+t.code+'"'+(fTeam===t.code?" selected":"")+'>'+esc(t.name)+'</option>'; }).join("")+'</select>'+
    '<select id="pPos" style="max-width:150px" aria-label="Filter by position"><option value="">All positions</option>'+["LW","C","RW","LD","RD","G"].map(function(p){ return '<option'+(fPos===p?" selected":"")+'>'+p+'</option>'; }).join("")+'</select>'+
    '<div class="seg"><button data-flag="" class="'+(fFlag===""?"on":"")+'">All</button><button data-flag="rookie" class="'+(fFlag==="rookie"?"on":"")+'">Rookies</button><button data-flag="susp" class="'+(fFlag==="susp"?"on":"")+'">Suspended</button></div>'+

    if (fFlag==="susp" && !lg.suspensions.some(function(s){ return s.playerId===p.id && s.status!=="served"; })) return false;

  }).sort(function(a,b){ return lg.ratings[b.id].ovr - lg.ratings[a.id].ovr; });
  var rows = list.map(function(p){
    var s = lg.pstats[p.id];

        (p.rookie?'<span class="chip" style="font-size:9px;padding:1px 7px">R</span>':"")+'</span></td>'+
      '<td class="tnum">'+p.pos+'</td><td class="tnum">'+p.jersey+'</td>'+
      '<td class="tleft small" style="color:var(--steel)">'+esc(p.arch)+'</td>'+
      '<td class="tnum">'+s.gp+'</td><td class="tleft tnum" style="font-size:12px">'+stat+'</td>'+
      '<td><span class="ovrbox '+CG.ovrClass(lg.ratings[p.id].ovr)+'" style="min-width:34px;height:24px;font-size:13px">'+lg.ratings[p.id].ovr+'</span></td></tr>';
  }).join("");
  var body = list.length
    ? '<div class="card"><div class="card-h"><h3>'+list.length+' players</h3><span class="chip">Sorted by overall</span></div>'+
      '<div class="tblwrap"><table class="tbl keepcols"><thead><tr><th class="tleft">Player</th><th>POS</th><th>#</th><th class="tleft">Style</th><th>GP</th><th class="tleft">Season</th><th>OVR</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'
    : '<div class="empty"><div class="e-art">'+CG.ic("user",22)+'</div><b>No players match</b><p>Loosen the filters — every rostered player in the league lives in this directory.</p></div>';
  return head + filters + '<div class="shell" style="padding-bottom:40px">'+body+'</div>';
};
CG.AFTER.players = function(param, qs){
  function nav(patch){
    var q = Object.assign({team:qs.team||"",pos:qs.pos||"",q:qs.q||"",flag:qs.flag||""}, patch);
    location.hash = "#/players?team="+q.team+"&pos="+q.pos+"&q="+encodeURIComponent(q.q)+"&flag="+q.flag;
  }
  $("#pTeam").addEventListener("change", function(){ nav({team:this.value}); });
  $("#pPos").addEventListener("change", function(){ nav({pos:this.value}); });
  $$("[data-flag]").forEach(function(b){ b.addEventListener("click", function(){ nav({flag:this.getAttribute("data-flag")}); }); });
  /* live in-place filter — no re-render, so the suggestion menu and focus survive typing */
  var pq = $("#pQ");
  function filterRows(){
    var q = pq.value.trim().toLowerCase();
    var rows = $$("#app table tbody tr"), shown = 0;
    rows.forEach(function(tr){
      var hit = !q || tr.textContent.toLowerCase().indexOf(q)>=0;
      tr.style.display = hit ? "" : "none";
      if (hit) shown++;
    });
    var h = $("#app .card-h h3");
    if (h) h.textContent = shown+" player"+(shown===1?"":"s");
  }
  pq.addEventListener("input", function(){ if (!this.dataset.acId) filterRows(); });
  CG.attachAC(pq, { kinds:["players"],
    onPick: function(it){ location.hash = "#/player/"+it.id; },
    onClear: filterRows
  });
};

        '<p class="small" style="color:var(--steel);line-height:1.65">'+esc(scout)+'</p></div></div></div>'+

  return head + tabs + body;

CG.scoutLine = function(p){
  var lg = CG.lg, s = lg.pstats[p.id], r = lg.ratings[p.id];
  if (p.pos==="G"){
    if (!s.gp) return p.tag+" has yet to see game action this season, so there is no performance record to evaluate.";
    var svp = (s.sv/Math.max(1,s.sa)).toFixed(3).replace(/^0/,"");
    return p.tag+" has started "+s.gp+" of "+lg.teams[p.team].gp+" club games with a "+svp+" save percentage and a "+
      (s.ga/Math.max(1,s.gp)).toFixed(2)+" goals-against average ("+s.w+"-"+s.l+"-"+s.otl+"). "+
      (s.so?("Has "+s.so+" shutout"+(s.so>1?"s":"")+" and "):"Has ")+s.qs+" quality starts in "+s.gp+" appearances. Every figure here is aggregated from recorded box scores.";
  }
  if (!s.gp) return p.tag+" has not drawn into a lineup yet this season — no conclusions until the sample exists.";
  var ppg = (s.p/s.gp).toFixed(2);
  return p.tag+" is producing "+ppg+" points per game across "+s.gp+" games ("+s.g+"G, "+s.a+"A), shooting "+
    (s.shots?Math.round(100*s.g/s.shots):0)+"% with a "+(s.pm>0?"+":"")+s.pm+" rating. Defensive activity — "+
    s.blk+" blocks, "+s.tk+" takeaways, "+s.hits+" hits — rates "+ (r.parts.defense>=60?"above":"near")+" the league bar for the position. Discipline: "+
    s.pim+" PIM. This summary is computed from verified game data only.";
};

      '<th class="tleft">Goaltender</th><th class="sortable">GP</th><th class="sortable">W</th><th class="sortable">L</th><th class="sortable">OTL</th><th class="sortable">SA</th><th class="sortable">SV</th><th class="sortable sorted">SV%</th><th class="sortable">GAA</th><th class="sortable">SO</th><th class="sortable">QS</th></tr></thead><tbody>'+
      gl.map(function(p){ var s=lg.pstats[p.id]; var svp = s.sa? s.sv/s.sa : 0;
        return '<tr class="rowlink" style="--tc:'+CG.TEAM[p.team].color+'" data-go="'+CG.playerRoute(p)+'">'+
        '<td class="tleft"><span class="playercell">'+CG.crest(p.team,22)+'<span><span class="nm">'+esc(p.tag)+'</span><small>'+CG.TEAM[p.team].code+'</small></span></span></td>'+
        '<td data-v="'+s.gp+'">'+s.gp+'</td><td data-v="'+s.w+'">'+s.w+'</td><td data-v="'+s.l+'">'+s.l+'</td><td data-v="'+s.otl+'">'+s.otl+'</td>'+
        '<td data-v="'+s.sa+'">'+s.sa+'</td><td data-v="'+s.sv+'">'+s.sv+'</td>'+
        '<td data-v="'+svp.toFixed(3)+'" class="pts">'+svp.toFixed(3).replace(/^0/,"")+'</td>'+
        '<td data-v="'+(s.gp?s.ga/s.gp:99).toFixed(2)+'">'+(s.gp?(s.ga/s.gp).toFixed(2):"—")+'</td>'+
        '<td data-v="'+s.so+'" class="'+(s.so?"":"z")+'">'+s.so+'</td><td data-v="'+s.qs+'">'+s.qs+'</td></tr>'; }).join("")+'</tbody></table>';
  } else {
    table = '<table class="tbl keepcols" id="statTbl"><caption>Team statistics</caption><thead><tr>'+
      '<th class="tleft">Club</th><th class="sortable">GP</th><th class="sortable">GF/GP</th><th class="sortable">GA/GP</th><th class="sortable sorted">DIFF</th><th class="sortable">S/GP</th><th class="sortable">SA/GP</th><th class="sortable">S%</th><th class="sortable">Home</th><th class="sortable">Road</th><th class="sortable">PTS%</th></tr></thead><tbody>'+
      CG.standings(lg).map(function(r){
        var gp = Math.max(1,r.gp);
        return '<tr class="rowlink" style="--tc:'+r.team.color+'" data-go="#/team/'+r.code+'">'+
        '<td class="tleft"><span class="teamcell">'+CG.crest(r.code,24)+'<span class="nm">'+esc(r.team.name)+'</span></span></td>'+
        '<td data-v="'+r.gp+'">'+r.gp+'</td><td data-v="'+(r.gf/gp).toFixed(2)+'">'+(r.gf/gp).toFixed(2)+'</td><td data-v="'+(r.ga/gp).toFixed(2)+'">'+(r.ga/gp).toFixed(2)+'</td>'+
        '<td data-v="'+r.diff+'" class="pts" style="color:'+(r.diff>0?"var(--green)":r.diff<0?"var(--red)":"inherit")+'">'+(r.diff>0?"+":"")+r.diff+'</td>'+
        '<td data-v="'+(r.sf/gp).toFixed(1)+'">'+(r.sf/gp).toFixed(1)+'</td><td data-v="'+(r.sa/gp).toFixed(1)+'">'+(r.sa/gp).toFixed(1)+'</td>'+
        '<td data-v="'+(r.sf?100*r.gf/r.sf:0).toFixed(1)+'">'+(r.sf?(100*r.gf/r.sf).toFixed(1):"—")+'</td>'+
        '<td data-v="'+r.hw+'">'+r.hw+"-"+r.hl+'</td><td data-v="'+r.aw+'">'+r.aw+"-"+r.al+'</td>'+
        '<td data-v="'+(r.ptsPct*100).toFixed(0)+'">'+(r.ptsPct*100).toFixed(0)+'%</td></tr>'; }).join("")+'</tbody></table>';
  }
  return head + tabs + '<div class="card"><div class="tblwrap">'+table+'</div></div>'+
    '<p class="caption" style="margin:14px 0 40px">Definitions: P/GP points per game · S% shooting percentage · TK takeaways · GWG game-winning goals · FO% faceoff win rate · QS quality starts (≥.885 SV% in a start). Metrics the data can’t support aren’t shown.</p></div>';
};

CG.ROUTES.rulebook = function(param, qs){
  var rb = CG.CONTENT.rulebook;
  var q = (qs.q||"").toLowerCase();
  var target = qs.rule||"";
  var edits = CG.store.get("rbEdits")||{};
  var head = CG.pageHead("Official rulebook · v"+rb.changelog[0].version+" · effective "+CG.fmtDate("2026-07-01"),
    "CGHL Rulebook","Ten chapters. Searchable, versioned, and linkable — cite a rule by its number anywhere in the league.",
    '<div style="display:flex;gap:9px;align-self:flex-end"><button class="btn btn-ghost btn-sm" id="rbPrint">'+CG.ic("doc",14)+'Print view</button></div>');
  var toc = '<div class="card"><div class="card-h"><h3>Contents</h3></div><div style="padding:8px 0">'+
    rb.chapters.map(function(ch){
      return '<a class="pop-item" href="#/rulebook?rule='+ch.sections[0].id+'" style="font-size:13px"><b class="num" style="font-family:var(--f-mono);color:var(--steel);width:20px">'+ch.num+'</b>'+esc(ch.title)+'</a>';
    }).join("")+'</div></div>'+
    '<div class="card" style="margin-top:16px"><div class="card-h"><h3>Version history</h3></div>'+
    rb.changelog.map(function(c){
      return '<div class="notif" style="cursor:default"><span class="nf-ic">'+CG.ic("doc",14)+'</span><span><b>v'+esc(c.version)+'</b><p>'+esc(c.summary)+'</p></span><span class="nf-t">'+CG.fmtDate(c.dateIso)+'</span></div>';
    }).join("")+'</div>';
  var chaptersHtml = rb.chapters.map(function(ch){
    var secs = ch.sections.filter(function(s){
      if (!q) return true;
      return (s.id+" "+s.title+" "+s.paragraphs.join(" ")).toLowerCase().indexOf(q)>=0;
    });
    if (!secs.length) return "";
    return '<div class="card" style="margin-bottom:18px" id="ch'+ch.num+'"><div class="card-h"><h3>Chapter '+ch.num+' — '+esc(ch.title)+'</h3></div><div class="card-b">'+
      secs.map(function(s){
        var text = edits[s.id] ? edits[s.id] : s.paragraphs.join("\n\n");
        var hl = target===s.id;
        return '<div id="rule-'+s.id+'" style="padding:14px;border-radius:10px;margin-bottom:8px;'+(hl?"background:var(--chrome-tint);border:1.5px solid var(--chrome-deep)":"")+'">'+
          '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><b class="mono" style="font-size:13px;color:var(--steel)">'+s.id+'</b>'+
          '<b style="font-family:var(--f-disp);font-size:16px">'+esc(s.title)+'</b>'+
          '<button class="chip" data-copyrule="'+s.id+'" title="Copy a direct link to this rule" style="cursor:pointer">Link</button>'+
          (edits[s.id]?'<span class="chip chip-warn">Amended v-next (draft)</span>':"")+'</div>'+
          text.split("\n\n").map(function(pp){ return '<p class="small" style="color:var(--ink-3);margin-top:9px;line-height:1.65;max-width:76ch">'+esc(pp)+'</p>'; }).join("")+
        '</div>';
      }).join("")+'</div></div>';
  }).join("");
  if (q && !chaptersHtml) chaptersHtml = '<div class="empty"><div class="e-art">'+CG.ic("search",22)+'</div><b>No rules match “'+esc(qs.q)+'”</b><p>Try a rule number (like 7.4) or a keyword like “forfeit” or “availability”.</p></div>';
  return head + '<div class="shell" style="padding-bottom:40px"><div class="grid g32" style="align-items:start">'+
    '<div class="hub-side" style="position:static;display:block">'+toc+'</div>'+
    '<div><input type="search" id="rbQ" placeholder="Search the rulebook… (e.g. 7.4, forfeit, overtime)" value="'+esc(qs.q||"")+'" style="margin-bottom:18px" aria-label="Search rulebook">'+chaptersHtml+'</div>'+
  '</div></div>';
};

/* ---------- MATCHUP CENTER ---------- */
CG.gameCode = function(id){
  var n = parseInt(id.replace(/\D/g,""),10);
  var A = "BCDFGHJKMPQRSTVWXZ";
  return "CGHL-"+A[(n*7)%18]+A[(n*13)%18]+((n*37)%9+1)+"-"+A[(n*5)%18]+A[(n*11)%18]+((n*53)%9+1);
};
CG.plannedLineup = function(g, code){
  var saved = (CG.store.get("lineups")||{})[g.id+":"+code];
  if (saved && saved.status!=="draft") return saved.slots;
  var slots = {};
  ["LW","C","RW","LD","RD","G"].forEach(function(pos){
    var pick = CG.lg.byTeam[code].filter(function(p){ return p.pos===pos; }).sort(function(a,b){ return a.depth-b.depth; })[0];
    slots[pos] = pick.id;
  });
  return slots;
};
CG.ROUTES.matchup = function(id){
  var lg = CG.lg;
  var g = lg.schedule.find(function(x){ return x.id===id; });
  if (!g) return CG.ROUTES._404();
  var res = lg.results.find(function(r){ return r.id===id; });
  var now = CG.now();
  var th = lg.teams[g.home], ta = lg.teams[g.away];
  var prPos = {}; lg.powerRankings.forEach(function(p){ prPos[p.team]=p.rank; });
  /* head-to-head from results */
  var h2h = { home:0, away:0 };
  lg.results.forEach(function(r){

CG.AFTER.matchup = function(id){
  var g = CG.lg.schedule.find(function(x){ return x.id===id; });
  var el = $("#mxCount");
  if (el && g){
    function tick(){
      var ms = g.at - CG.now();
      if (ms<=0){ el.textContent = "LIVE"; return; }
      var h = Math.floor(ms/3600000), m = Math.floor(ms%3600000/60000), s = Math.floor(ms%60000/1000);
      el.textContent = (h?h+":":"")+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    }
    tick();
    var iv = setInterval(function(){ if (!document.body.contains(el)){ clearInterval(iv); return; } tick(); }, 1000);
  }
};

/* league-wide trade block, honoring live toggles; management never blocks itself */
CG.blockedPlayers = function(){
  return CG.lg.players.filter(function(p){ return !p.mgmt && CG.isOnBlock(p.id); });
};
/* incoming offers still awaiting a decision */
CG.incomingOffers = function(){
  var dec = CG.store.get("tradeDecisions")||{};
  return (CG.lg.incoming||[]).filter(function(o){ return !dec[o.id]; });
};
CG.incomingCount = function(){ return CG.can("trades.manage") ? CG.incomingOffers().length : 0; };
CG.tradePlayerLine = function(pid){
  var p = CG.playerById(CG.lg, pid); if (!p) return "";
  return '<span class="playercell">'+CG.crest(p.team,18)+'<span class="nm">'+esc(p.tag)+'</span>'+
    '<small style="color:var(--steel)">'+p.pos+' · OVR '+CG.lg.ratings[p.id].ovr+' · '+CG.fmtMoney(CG.playerSalary(CG.lg,pid))+'</small></span>';
};

/* hub sidebar per role */
CG.hubNav = function(section){
  var r = CG.role();
  var items = [["", "Dashboard", "home"]];
  if (CG.can("availability.submit")) items.push(["availability","Availability","cal"]);
  if (CG.can("roster.manage") && r!=="commish") items.push(["roster","Roster","users"]);
  if (CG.can("trades.manage") && r!=="commish") items.push(["tradehub","Trade Hub","swap"]);
  if (CG.can("lineup.build") && r!=="commish") items.push(["lineup","Lineup builder","grid"]);
  if (CG.can("complaints.file")||CG.can("complaints.review")) items.push(["complaints", r==="staff"?"Case queue":"Complaints","flag"]);
  if (r==="staff") items.push(["statsentry","Stats entry","chart"]);
  items.push(["notifications","Notifications","bell"]);
  items.push(["settings","Settings","gear"]);
  return '<nav class="hub-side" aria-label="Hub sections"><div class="hs-group">'+esc(CG.persona().label)+' tools</div>'+
    items.map(function(it){
      var badge = "";
      if (it[0]==="availability" && !CG.store.get("availability")["w8:"+(CG.me()||{}).id]) badge = '<span class="hs-n">due</span>';
      if (it[0]==="tradehub" && CG.incomingCount()) badge = '<span class="hs-n">'+CG.incomingCount()+'</span>';
      if (it[0]==="notifications" && CG.unreadCount()) badge = '<span class="hs-n">'+CG.unreadCount()+'</span>';
      if (it[0]==="complaints" && CG.role()==="staff"){
        var openN = CG.visibleComplaints().filter(function(c){ return c.status!=="Resolved"; }).length;
        if (openN) badge = '<span class="hs-n">'+openN+'</span>';
      }
      return '<a href="#/hub'+(it[0]?"/"+it[0]:"")+'" class="'+(section===it[0]?"on":"")+'">'+CG.ic(it[2],15)+it[1]+badge+'</a>';
    }).join("")+'</nav>';
};
CG.hubShell = function(section, inner){
  return '<section class="sec-tight"><div class="shell"><div class="hub-grid">'+CG.hubNav(section)+'<div>'+inner+'</div></div></div></section>';
};
CG.unauthorized = function(need){
  return '<section class="sec"><div class="shell"><div class="empty" style="padding:70px 20px">'+
    '<div class="e-art">'+CG.ic("lock",22)+'</div><b>You don’t have access to this area</b>'+
    '<p>'+esc(need||"This area is limited to signed-in league members with the right role.")+'</p>'+
    '<a class="btn btn-ink" href="#/signin" style="margin-top:18px">Switch demo seat</a></div></div></section>';
};

CG.ROUTES.hub = function(param, qs){
  var r = CG.role();
  if (r==="guest") return CG.unauthorized("Sign in to reach your dashboard — pick any demo seat to explore the member experience.");
  if (r==="commish" && !param) { location.hash = "#/admin"; return ""; }
  var section = param||"";
  if (section==="") return CG.hubShell("", CG.hubDashboard());
  if (section==="availability") return CG.hubShell("availability", CG.hubAvailability());
  if (section==="roster") return CG.can("roster.manage") ? CG.hubShell("roster", CG.hubRoster(qs)) : CG.unauthorized("Roster management is a team-management tool. Switch to the Team Mgmt seat to try it.");
  if (section==="tradehub") return CG.can("trades.manage") ? CG.hubShell("tradehub", CG.hubTradeHub(qs)) : CG.unauthorized("The Trade Hub is confidential to team management. Switch to the Team Mgmt seat to try it.");
  if (section==="lineup") return CG.can("lineup.build") ? CG.hubShell("lineup", CG.hubLineup(qs)) : CG.unauthorized("The lineup builder is a team-management tool. Switch to the Team Mgmt seat to try it.");
  if (section==="complaints") return CG.hubShell("complaints", CG.hubComplaints());
  if (section==="complaint") return CG.hubShell("complaints", CG.hubComplaintDetail(qs.id));
  if (section==="statsentry") return r==="staff" ? CG.hubShell("statsentry", CG.hubStatsEntry()) : CG.unauthorized();
  if (section==="notifications") return CG.hubShell("notifications", CG.hubNotifications());
  if (section==="settings") return CG.hubShell("settings", CG.hubSettings());
  return CG.ROUTES._404();
};

/* Tonight's slate — every game clickable through to its matchup center
   (line matchup, server/lobby settings, and the private game code). */
CG.tonightCard = function(me, myGame, inLineup){
  var lg = CG.lg;
  var rows = lg.tonight.slice().sort(function(a,b){ return a.at-b.at; }).map(function(g){
    var mine = me && (g.home===me.team||g.away===me.team);
    return '<div class="notif" data-go="#/matchup/'+g.id+'" style="cursor:pointer'+(mine?';background:var(--chrome-tint)':"")+'">'+
      '<span class="nf-ic">'+CG.crest(g.away,22)+'</span>'+
      '<span style="min-width:0"><b style="font-family:var(--f-disp)">'+esc(CG.TEAM[g.away].code)+' @ '+esc(CG.TEAM[g.home].code)+'</b>'+
      '<p>'+esc(CG.TEAM[g.away].name)+' at '+esc(CG.TEAM[g.home].name)+
        (g.feature?' · <span style="color:var(--chrome-deep);font-weight:700">Marquee</span>':"")+
        (mine?' · <span style="font-weight:700">your game</span>':"")+'</p></span>'+
      '<span class="nf-t" style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">'+CG.fmtTime(g.at)+
        '<span class="chip" style="font-size:9px;padding:1px 7px">Matchup ›</span></span></div>';
  }).join("");
  var note = myGame
    ? '<div class="card-b" style="border-top:1px solid var(--line)"><p class="small" style="color:var(--steel)">'+(inLineup
        ? "You’re in the confirmed lineup at "+CG.POS_NAME[me.pos]+". Your private game code goes live at "+CG.fmtTime(myGame.at-30*60000)+" — open the matchup to grab it."
        : "You’re a scratch tonight — stay ready for a late swap. Tap your game to see the confirmed lines and lobby settings.")+'</p></div>'
    : '<div class="card-b" style="border-top:1px solid var(--line)"><span class="caption">Tap any game for confirmed lines, server settings, and the private lobby code (Rule 4.2).</span></div>';
  return '<div class="card" style="grid-column:1/-1"><div class="card-h"><h3>Tonight’s slate</h3>'+
    '<span class="chip chip-live"><span class="live-dot"></span>'+lg.tonight.length+' game'+(lg.tonight.length===1?"":"s")+'</span></div>'+
    rows + note + '</div>';
};

/* ---------- availability ---------- */
CG.hubAvailability = function(){
  var me = CG.me(), lg = CG.lg, r = CG.role();
  if (!CG.can("availability.submit") && !CG.can("availability.viewTeam")) return CG.unauthorized();
  var closed = CG.now() > CG.WEEK8.deadline;
  var mine = me ? CG.store.get("availability")["w8:"+me.id] : null;
  var h = '<div style="margin-bottom:22px"><span class="eyebrow chr">Week 8 · deadline '+CG.fmtFull(CG.WEEK8.deadline)+'</span>'+
    '<h1 class="h-sec" style="margin-top:8px">Weekly availability</h1>'+
    '<p class="lede" style="margin-top:8px">Two nights next week. Answers stay private to your club’s management and league staff (Rule 5.1'+(r==="mgmt"?" — as GM you also see the team grid below":"")+').</p></div>';
  var form = !me
    ? '<div class="note">You’re viewing as league staff — no player profile, so there’s nothing personal to submit. The team grid below is what management and staff see.</div>'
    : '<div class="card"><div class="card-h"><h3>My submission</h3>'+
    '<span class="chip '+(mine?"chip-win":closed?"chip-loss":"chip-warn")+'">'+(closed?"Window closed":mine?"Submitted "+CG.fmtDay(mine.at):"Not submitted")+'</span></div>'+
    '<div class="card-b">'+
    (closed && !mine ? '<div class="empty"><b>The Week 8 window has closed</b><p>Availability locked at the deadline. Message your GM — a commissioner can still enter a late submission with an override.</p></div>'
    : CG.WEEK8.nights.map(function(n,i){
      var cur = mine && mine.nights[n.key] ? mine.nights[n.key].st : null;
      var note = mine && mine.nights[n.key] ? (mine.nights[n.key].note||"") : "";
      return '<div style="padding:14px 0;border-top:'+(i?"1px solid var(--line-soft)":"0")+'">'+
        '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:11px">'+
        '<b style="font-family:var(--f-disp)">'+CG.fmtFull(n.at)+'</b><span class="caption">Game night '+(i+1)+'</span></div>'+

        }).join("")+'</div>'+
        '<input type="text" data-note="'+n.key+'" placeholder="Optional note (e.g. “on at 9:30 after work”)" value="'+esc(note)+'" style="margin-top:10px;max-width:460px" '+(closed?"disabled":"")+'>'+
      '</div>';
    }).join("")+
    (!closed?'<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">'+
      '<button class="btn btn-chrome" id="avSubmit">'+(mine?"Update availability":"Submit availability")+'</button>'+
      '<button class="btn btn-ghost" id="avCopy">Copy last week (all available)</button>'+
      '<span class="caption" style="align-self:center" id="avCount"></span></div>':""))+
    '</div></div>';
  var grid = "";
  if (CG.can("availability.viewTeam")){
    var roster = lg.byTeam[me?me.team:"CBR"].slice().sort(function(a,b){ return a.pos.localeCompare(b.pos); });
    grid = '<div class="card" style="margin-top:20px"><div class="card-h"><h3>Team grid — '+esc(CG.TEAM[me?me.team:"CBR"].name)+'</h3>'+
      '<span class="chip">Visible to management & staff only</span></div>'+
      '<div class="tblwrap"><table class="tbl keepcols"><caption>Week 8 availability by player</caption><thead><tr>'+
      '<th class="tleft">Player</th><th>POS</th><th>Wed 7/22</th><th>Sat 7/25</th><th class="tleft">Note</th><th>Logged</th></tr></thead><tbody>'+
      roster.map(function(p){
        var av = CG.avFor(p.id);
        function cell(nk){
          var st = av.nights[nk] ? av.nights[nk].st : "nr";
          var map = { yes:["yes","✓"], no:["no","✗"], maybe:["mb","?"], late:["mb","L"], until:["mb","U"], emg:["mb","E"], nr:["nr","—"] };
          var m = map[st]||map.nr;
          return '<span class="avcell '+m[0]+'" title="'+st+'">'+m[1]+'</span>';
        }
        var note = av.nights.n1 && av.nights.n1.note ? av.nights.n1.note : (av.nights.n2&&av.nights.n2.note?av.nights.n2.note:"");
        return '<tr'+(me&&p.id===me.id?' style="background:var(--chrome-tint)"':"")+'>'+
          '<td class="tleft"><span class="playercell">'+CG.crest(p.team,20)+'<span class="nm">'+esc(p.tag)+'</span>'+(me&&p.id===me.id?'<span class="chip" style="font-size:9px;padding:1px 7px">you</span>':"")+'</span></td>'+
          '<td class="tnum">'+p.pos+'</td><td>'+cell("n1")+'</td><td>'+cell("n2")+'</td>'+
          '<td class="tleft small" style="color:var(--steel);max-width:220px">'+esc(note)+'</td>'+
          '<td class="tnum" style="font-size:11px">'+(av.nights.n1.st==="nr"&&av.nights.n2.st==="nr"?'<span class="chip chip-loss" style="font-size:9px">no response</span>':CG.fmtDay(av.at))+'</td></tr>';
      }).join("")+'</tbody></table></div>'+
      '<div class="card-b" style="border-top:1px solid var(--line)"><span class="caption">✓ available · ✗ unavailable · ? maybe · L late · U until a time · E emergency only · — no response. Opponents never see this grid — they only see your finalized lineup.</span></div></div>';
  }
  return h + form + grid;
};
CG.AFTER._availability = function(){
  var me = CG.me(); if (!me) return;
  var picks = {};
  var mine = CG.store.get("availability")["w8:"+me.id];
  if (mine) Object.keys(mine.nights).forEach(function(k){ picks[k]=mine.nights[k].st; });
  function refreshCount(){
    var n = Object.keys(picks).filter(function(k){ return picks[k]; }).length;
    var el = $("#avCount"); if (el) el.textContent = n+"/2 nights answered";
  }
  $$(".av-opt").forEach(function(grp){
    grp.addEventListener("click", function(e){
      var b = e.target.closest("[data-av]"); if (!b || b.disabled) return;
      $$("button",grp).forEach(function(x){ x.className=""; });
      var v = b.getAttribute("data-av");
      b.className = "on "+(v==="yes"?"yes":v==="no"?"no":"");
      picks[grp.getAttribute("data-night")] = v;
      refreshCount();
    });
  });
  var sub = $("#avSubmit");
  if (sub) sub.addEventListener("click", function(){
    if (!picks.n1 || !picks.n2){ CG.toast("Answer both nights before submitting","err"); return; }
    var entry = { at: CG.now(), nights:{} };
    ["n1","n2"].forEach(function(k){
      entry.nights[k] = { st:picks[k], note: ($("[data-note="+k+"]")||{}).value||"" };
    });
    var all = CG.store.get("availability"); all["w8:"+me.id]=entry; CG.store.set("availability", all);
    CG.pushNotif("check","Availability submitted","Week 8 — logged "+CG.fmtFull(entry.at)+". You can edit until Sunday 8 PM ET.","#/hub/availability");
    CG.toast("Week 8 availability submitted","ok");
    CG.renderChrome(); CG.router();
  });
  var cp = $("#avCopy");
  if (cp) cp.addEventListener("click", function(){
    picks = { n1:"yes", n2:"yes" };
    $$(".av-opt").forEach(function(grp){
      $$("button",grp).forEach(function(x){ x.className = x.getAttribute("data-av")==="yes"?"on yes":""; });
    });
    refreshCount(); CG.toast("Copied last week — both nights available");
  });
  refreshCount();
};

/* ---------- lineup builder ---------- */
CG.hubLineup = function(qs){
  var me = CG.me(), lg = CG.lg;
  if (!me || !CG.lg.byTeam[me.team]) return '<div class="note">This seat has no club attached — the lineup builder belongs to team management. As commissioner you can override any club’s submitted lineup from the matchup page.</div>';
  var game = lg.tonight.find(function(g){ return g.home===me.team||g.away===me.team; })
    || lg.schedule.find(function(g){ return (g.home===me.team||g.away===me.team) && g.at>CG.now(); });
  if (!game) return '<div class="empty"><b>No upcoming game</b><p>The schedule is complete — nothing to build.</p></div>';
  var opp = game.home===me.team ? game.away : game.home;
  var key = game.id+":"+me.team;
  var saved = (CG.store.get("lineups")||{})[key];
  var lockAt = game.at - 30*60000;
  var locked = CG.now() >= lockAt;
  var status = saved ? saved.status : "draft";
  var slots = saved ? saved.slots : {};
  var roster = lg.byTeam[me.team];
  var suspended = {};
  lg.suspensions.forEach(function(s){ if (s.team===me.team && s.status!=="served") suspended[s.playerId]=true; });
  var assigned = Object.values(slots);
  var h = '<div style="margin-bottom:20px"><span class="eyebrow chr">'+CG.fmtFull(game.at)+' · vs '+esc(CG.TEAM[opp].name)+'</span>'+
    '<h1 class="h-sec" style="margin-top:8px">Lineup builder</h1>'+
    '<p class="lede" style="margin-top:8px">Click a bench player, then a slot — or drag them on. Six starters, one per position. Locks at '+CG.fmtTime(lockAt)+' (Rule 5.3); the opponent sees it 60 minutes before puck drop.</p></div>';
  var bar = '<div class="note '+(status==="submitted"?"grn":"chr")+'" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px">'+
    '<b style="font-family:var(--f-disp)">Status: '+(locked?"Locked":status)+'</b>'+
    (saved&&saved.at?'<span class="caption">last saved '+CG.fmtFull(saved.at)+'</span>':"")+
    '<span style="margin-left:auto;display:flex;gap:9px">'+
    (!locked?'<button class="btn btn-ghost btn-sm" id="luAuto">Auto-fill best available</button>'+
      '<button class="btn btn-ghost btn-sm" id="luClear">Clear</button>'+
      '<button class="btn btn-chrome btn-sm" id="luSubmit">'+(status==="submitted"?"Resubmit":"Submit lineup")+'</button>'
      :'<span class="lock">'+CG.ic("lock",14)+'Lineup locked — commissioner override only</span>')+
    '</span></div>';
  var rink = '<div class="rink"><div class="rk-rows">'+
    '<div class="rk-line">'+["LW","C","RW"].map(function(pos){ return CG.luSlot(pos, slots[pos], locked); }).join("")+'</div>'+
    '<div class="rk-line d2">'+["LD","RD"].map(function(pos){ return CG.luSlot(pos, slots[pos], locked); }).join("")+'</div>'+
    '<div class="rk-line g1">'+CG.luSlot("G", slots.G, locked)+'</div>'+
  '</div></div>';
  var bench = '<div class="card"><div class="card-h"><h3>Bench — '+esc(CG.TEAM[me.team].name)+'</h3><span class="chip">'+roster.length+' rostered</span></div>'+
    '<div class="card-b bench">'+roster.slice().sort(function(a,b){ return a.pos.localeCompare(b.pos)||a.depth-b.depth; }).map(function(p){
      var av = CG.avFor(p.id);
      var w8night = CG.WEEK8.nights.some(function(n){ return Math.abs(n.at - game.at) < 6*3600000; });
      var un = w8night && av.nights.n1.st==="no";
      var used = assigned.indexOf(p.id)>=0;
      var dis = suspended[p.id];
      var reason = dis ? "Suspended (Rule 7.4)" : un ? "Marked unavailable" : "";
      return '<div class="bp'+(used?" dis":"")+(dis||un?" dis":"")+'" data-bench="'+p.id+'" draggable="'+(!locked&&!used&&!dis)+'" '+(reason?'title="'+esc(reason)+'"':"")+'>'+
        CG.crest(p.team,20)+'<b style="font-size:13px">'+esc(p.tag)+'</b><span class="mono" style="font-size:10px;color:var(--steel)">'+p.pos+'</span>'+
        (dis?'<span class="chip chip-loss" style="font-size:9px">SUSP</span>':un?'<span class="chip chip-warn" style="font-size:9px">UNAVAIL</span>':used?'<span class="chip chip-win" style="font-size:9px">IN</span>':"")+
        '<span class="bp-meta">OVR '+lg.ratings[p.id].ovr+'</span></div>';
    }).join("")+'</div>'+
    '<div class="card-b" style="border-top:1px solid var(--line)"><span class="caption" id="luMsg">Assignments validate position, availability, suspension, and duplicates — errors explain themselves.</span></div></div>';
  var hist = saved && saved.rev && saved.rev.length
    ? '<div class="card" style="margin-top:18px"><div class="card-h"><h3>Revision history</h3></div>'+

    : "";
  return h + bar + '<div class="grid g5x7" style="align-items:start"><div>'+rink+hist+'</div>'+bench+'</div>';

CG.luSlot = function(pos, pid, locked){
  var p = pid && CG.playerById(CG.lg, pid);
  return '<div class="slot'+(p?" filled":"")+'" data-slot="'+pos+'" '+(locked?"":'tabindex="0" role="button" aria-label="'+CG.POS_NAME[pos]+' slot"')+'>'+
    '<div class="sl-pos">'+CG.POS_NAME[pos]+'</div>'+
    (p?'<div class="sl-name">'+esc(p.tag)+'</div><div class="sl-sub">OVR '+CG.lg.ratings[p.id].ovr+' · tap to clear</div>'
      :'<div class="sl-sub" style="margin-top:14px">Empty — assign from the bench</div>')+'</div>';
};
CG.AFTER._lineup = function(){
  var me = CG.me(); if (!me) return;
  var lg = CG.lg;
  var game = lg.tonight.find(function(g){ return g.home===me.team||g.away===me.team; })
    || lg.schedule.find(function(g){ return (g.home===me.team||g.away===me.team) && g.at>CG.now(); });
  if (!game) return;
  var key = game.id+":"+me.team;
  var store = CG.store.get("lineups")||{};
  var state = store[key] || { slots:{}, status:"draft", rev:[] };
  var sel = null;
  /* is this game one of the Week-8 nights availability was collected for? */
  var isWeek8Night = CG.WEEK8.nights.some(function(n){ return Math.abs(n.at - game.at) < 6*3600000; });
  function isLocked(){ return CG.now() >= game.at - 30*60000; }
  function msg(t, bad){ var el=$("#luMsg"); if (el){ el.textContent=t; el.style.color = bad?"var(--red)":"var(--steel)"; } }
  function save(what, status){
    state.at = CG.now();
    if (status) state.status = status;
    state.rev = (state.rev||[]).concat([{at:CG.now(), what:what}]).slice(-6);
    store[key]=state; CG.store.set("lineups", store);
    CG.router();
  }
  function validate(p, pos){
    if (isLocked()) return "The lineup locked at "+CG.fmtTime(game.at-30*60000)+" (Rule 5.3) — only a commissioner override can change it now.";
    if (p.pos!==pos) return p.tag+" is a "+CG.POS_NAME[p.pos]+" — this slot needs a "+CG.POS_NAME[pos]+".";
    if (lg.suspensions.some(function(s){ return s.playerId===p.id && s.status!=="served"; })) return p.tag+" is suspended and cannot be assigned (Rule 7.4).";
    if (isWeek8Night && CG.avFor(p.id).nights.n1.st==="no") return p.tag+" is marked unavailable for this night.";
    if (Object.values(state.slots).indexOf(p.id)>=0) return p.tag+" is already in the lineup.";
    return null;
  }
  function assign(pid, pos){
    var p = CG.playerById(lg, pid);
    var err = validate(p, pos);
    if (err){ msg(err, true); CG.toast(err, "err"); return; }
    state.slots[pos] = pid;
    save("Assigned "+p.tag+" to "+pos);
  }
  document.querySelectorAll("[data-bench]").forEach(function(el){
    el.addEventListener("click", function(){
      if (el.classList.contains("dis")) { msg(el.getAttribute("title")||"That player can’t be assigned.", true); return; }
      sel = el.getAttribute("data-bench");
      $$(".bp").forEach(function(x){ x.classList.remove("sel"); });
      el.classList.add("sel");
      var p = CG.playerById(lg, sel);
      msg("Selected "+p.tag+" — now click the "+CG.POS_NAME[p.pos]+" slot.");
      $$(".slot").forEach(function(s){ s.classList.toggle("target", s.getAttribute("data-slot")===p.pos); });
    });
    el.addEventListener("dragstart", function(ev){ ev.dataTransfer.setData("text/plain", el.getAttribute("data-bench")); });
  });
  $$(".slot").forEach(function(s){
    var pos = s.getAttribute("data-slot");
    s.addEventListener("click", function(){
      if (isLocked()){ msg("The lineup locked at "+CG.fmtTime(game.at-30*60000)+" (Rule 5.3).", true); return; }
      if (sel){ assign(sel, pos); sel=null; return; }
      if (state.slots[pos]){
        var p = CG.playerById(lg, state.slots[pos]);
        delete state.slots[pos];
        save("Removed "+p.tag+" from "+pos);
      }
    });
    s.addEventListener("keydown", function(e){ if (e.key==="Enter"||e.key===" "){ e.preventDefault(); s.click(); } });
    s.addEventListener("dragover", function(e){ e.preventDefault(); s.classList.add("target"); });
    s.addEventListener("dragleave", function(){ s.classList.remove("target"); });
    s.addEventListener("drop", function(e){ e.preventDefault(); assign(e.dataTransfer.getData("text/plain"), pos); });
  });
  var auto = $("#luAuto");
  if (auto) auto.addEventListener("click", function(){
    if (isLocked()){ CG.toast("Lineup is locked (Rule 5.3)","err"); return; }
    ["LW","C","RW","LD","RD","G"].forEach(function(pos){
      var cands = lg.byTeam[me.team].filter(function(p){
        return p.pos===pos && !validate(p,pos) || (p.pos===pos && state.slots[pos]===p.id);
      }).sort(function(a,b){ return lg.ratings[b.id].ovr-lg.ratings[a.id].ovr; });
      var pick = lg.byTeam[me.team].filter(function(p){ return p.pos===pos; })
        .sort(function(a,b){ return lg.ratings[b.id].ovr-lg.ratings[a.id].ovr; })
        .find(function(p){ return !validate(p,pos) || state.slots[pos]===p.id; });
      if (pick) state.slots[pos]=pick.id;
    });
    save("Auto-filled best available lineup");
    CG.toast("Best available lineup filled","ok");
  });
  var clr = $("#luClear");
  if (clr) clr.addEventListener("click", function(){
    if (isLocked()){ CG.toast("Lineup is locked (Rule 5.3)","err"); return; }
    state.slots={}; save("Cleared all slots");
  });
  var sub = $("#luSubmit");
  if (sub) sub.addEventListener("click", function(){
    if (isLocked()){ CG.toast("Lineup is locked (Rule 5.3) — commissioner override only","err"); return; }
    var missing = ["LW","C","RW","LD","RD","G"].filter(function(pos){ return !state.slots[pos]; });
    if (missing.length){ CG.toast("Fill every slot first — missing "+missing.join(", "), "err"); return; }
    CG.confirm("Submit this lineup?","Your six starters go to the league office and release to the opponent 60 minutes before puck drop. You can resubmit until the lock.","Submit lineup", function(){
      save("Lineup submitted to the league office","submitted");
      CG.pushNotif("check","Lineup submitted","vs "+CG.TEAM[game.home===me.team?game.away:game.home].name+" — locks "+CG.fmtTime(game.at-30*60000)+".","#/hub/lineup");
      CG.audit("Lineup submitted",""+key);
      CG.toast("Lineup submitted","ok");
      CG.renderChrome();
    });
  });
};

CG._tradeDraft = null;
CG.tradeDraft = function(){ if (!CG._tradeDraft) CG._tradeDraft = { partner:null, send:[], recv:[] }; return CG._tradeDraft; };
CG.tradeAddPlayer = function(pid){
  var p = CG.playerById(CG.lg, pid); if (!p || p.mgmt) return;
  var d = CG.tradeDraft();
  if (p.team===CG.myClub()){ if (d.send.indexOf(pid)<0) d.send.push(pid); }
  else { if (d.partner && d.partner!==p.team) d.recv = []; d.partner = p.team; if (d.recv.indexOf(pid)<0) d.recv.push(pid); }
};
CG.tradeCapAfter = function(club, sendPids, recvPids){
  var out = sendPids.reduce(function(s,pid){ return s+CG.playerSalary(CG.lg,pid); }, 0);
  var inc = recvPids.reduce(function(s,pid){ return s+CG.playerSalary(CG.lg,pid); }, 0);
  return CG.teamPayroll(CG.lg, club) - out + inc;
};

    }).join("");
  } else {

  }
  inc += '</div>';

  /* ---- trade builder ---- */

  var sendPay = d.send.reduce(function(s,pid){ return s+CG.playerSalary(lg,pid); },0);

  var capAfter = CG.tradeCapAfter(club, d.send, d.recv);
  var over = capAfter > CG.CAP;
  function sideList(side, pids){

CG.visibleComplaints = function(){
  var r = CG.role(), me = CG.me();
  var base = CG.CONTENT.ops.complaints.slice();
  var mine = CG.store.get("myComplaints")||[];
  var overrides = CG.store.get("caseDecisions")||{};
  var all = base.concat(mine).map(function(c){
    var o = overrides[c.caseId];
    return o ? Object.assign({}, c, o, { timeline:(c.timeline||[]).concat(o.timeline||[]) }) : c;
  });
  if (r==="commish") return all;
  if (r==="staff") return all.filter(function(c){ return c.assignedTo==="RefCam_Official"; });
  if (!me) return [];
  return all.filter(function(c){
    var own = c.filedBy===me.tag || c._mine;
    if (c.confidential && !own) return false;   /* filers always see their own case */
    return own || (r==="mgmt" && (c.against||"").indexOf("Circuit")>=0);
  });
};
CG.recordCaseAction = function(caseId, patch, timelineEntry){
  var o = CG.store.get("caseDecisions")||{};
  var cur = o[caseId]||{ timeline:[] };
  o[caseId] = Object.assign({}, cur, patch, {
    timeline: (cur.timeline||[]).concat(timelineEntry?[timelineEntry]:[])
  });
  CG.store.set("caseDecisions", o);
};

    if (radio) radio.addEventListener("change", function(){ if (radio.checked) pickTheme(l); });
    else l.addEventListener("click", function(){ pickTheme(l); });
  });
};

CG.AFTER._admResults = function(){
  var shots = $("#aiShots");
  if (shots) shots.addEventListener("change", function(){
    var files = this.files; if (!files.length) return;
    var gid = $("#aiGame").value;
    var g = CG.lg.schedule.find(function(x){ return x.id===gid; });
    /* simulated parse: deterministic scores from the file names */
    var seed = 0; Array.prototype.forEach.call(files, function(f){ for (var i=0;i<f.name.length;i++) seed += f.name.charCodeAt(i); });
    var rng = CG.makeRng(seed + parseInt(gid.replace(/\D/g,""),10));
    var hs = 1+Math.floor(rng()*5), as = 1+Math.floor(rng()*5);
    if (hs===as) hs++;
    $("#aiOut").innerHTML = '<div class="note grn" style="margin-top:12px"><b style="font-family:var(--f-disp)">Parsed '+files.length+' screenshot'+(files.length>1?"s":"")+' — simulated Gemini read:</b>'+
      '<p class="small" style="margin-top:6px">'+esc(CG.TEAM[g.home].name)+' '+hs+' — '+as+' '+esc(CG.TEAM[g.away].name)+' · 12 skater lines + 2 goalie lines extracted</p>'+
      '<div style="display:flex;gap:9px;margin-top:10px"><button class="btn btn-ink btn-sm" id="aiUse">Verify & post this final</button>'+
      '<span class="caption" style="align-self:center">Staff always verify before it posts (Rule 6).</span></div></div>';
    $("#aiUse").addEventListener("click", function(){
      var entries = CG.store.get("results")||[];
      entries.push({ gameId:gid, hs:hs, as:as, ot:false });
      CG.store.set("results", entries);
      CG.audit("Final posted via AI import (simulated)", CG.TEAM[g.home].code+" "+hs+"–"+as+" "+CG.TEAM[g.away].code);
      CG.boot(); CG.renderChrome();
      CG.toast("Box score imported — league recomputed","ok");
      CG.router();
    });
  });
  $$("[data-enter]").forEach(function(b){
    b.addEventListener("click", function(){
      var id = this.getAttribute("data-enter");
      var g = CG.lg.schedule.find(function(x){ return x.id===id; });
      CG.modal("Enter final — "+CG.TEAM[g.away].code+" @ "+CG.TEAM[g.home].code,

CG.AFTER._admData = function(){
  $("#impFile").addEventListener("change", function(){
    var f = this.files[0]; if (!f) return;
    var rd = new FileReader();
    rd.onload = function(){
      var lines = String(rd.result).split(/\r?\n/).filter(Boolean);
      var head = (lines[0]||"").split(",");
      $("#impPreview").innerHTML = '<div class="note chr" style="margin-top:6px"><b style="font-family:var(--f-disp)">'+esc(f.name)+'</b> — '+(lines.length-1)+' rows · '+head.length+' columns detected'+
        '<div style="margin:10px 0"><span class="caption">Map columns:</span>'+head.slice(0,4).map(function(h){
          return '<div style="display:flex;gap:8px;align-items:center;margin-top:6px"><code class="mono" style="font-size:11px;background:var(--ice);padding:2px 8px;border-radius:5px">'+esc(h)+'</code>→'+
            '<select style="max-width:170px;padding:6px 8px"><option>player_tag</option><option>goals</option><option>assists</option><option>ignore</option></select></div>';
        }).join("")+'</div>'+
        '<button class="btn btn-ink btn-sm" id="impGo">Validate & import '+(lines.length-1)+' rows</button></div>';
      $("#impGo").addEventListener("click", function(){
        CG.audit("CSV import", f.name+" ("+(lines.length-1)+" rows)");
        CG.toast((lines.length-1)+" rows validated — import logged with rollback point","ok");
        $("#impPreview").innerHTML = '<div class="note grn" style="margin-top:6px">Import complete. In production this writes through the same validation layer as manual entry, with a job log and rollback.</div>';
      });
    };
    rd.readAsText(f);
  });
  $$("[data-export]").forEach(function(b){
    b.addEventListener("click", function(){
      var kind = this.getAttribute("data-export");
      if (kind==="standings"){
        var rows=[["Rank","Club","GP","W","L","OTL","GF","GA","DIFF","PTS"]];
        CG.standings(CG.lg).forEach(function(r,i){ rows.push([i+1,r.team.name,r.gp,r.w,r.l,r.otl,r.gf,r.ga,r.diff,r.pts]); });
        CG.exportCSV("cghl-standings.csv", rows); return;
      }
      if (kind==="schedule"){
        var rs=[["Week","Date","Away","Home","AS","HS","OT"]];
        CG.lg.schedule.forEach(function(g){ var r=CG.lg.results.find(function(x){return x.id===g.id;});
          rs.push([g.week,CG.fmtDay(g.at),CG.TEAM[g.away].name,CG.TEAM[g.home].name,r?r.score[g.away]:"",r?r.score[g.home]:"",r&&r.ot?"Y":""]); });
        CG.exportCSV("cghl-schedule.csv", rs); return;
      }
      if (kind==="skaters"||kind==="goalies"){
        var rows2=[kind==="skaters"?["Player","Team","POS","GP","G","A","P","PIM"]:["Goalie","Team","GP","W","L","OTL","SV%","GAA","SO"]];
        CG.lg.players.filter(function(p){ return kind==="skaters"?p.pos!=="G":p.pos==="G"; }).forEach(function(p){
          var s=CG.lg.pstats[p.id];
          rows2.push(kind==="skaters"?[p.tag,p.team,p.pos,s.gp,s.g,s.a,s.p,s.pim]
            :[p.tag,p.team,s.gp,s.w,s.l,s.otl,s.sa?(s.sv/s.sa).toFixed(3):"",s.gp?(s.ga/s.gp).toFixed(2):"",s.so]);
        });
        CG.exportCSV("cghl-"+kind+".csv", rows2); return;
      }
      if (kind==="audit"){
        var rows3=[["When","Who","Action","Detail"]];
        (CG.store.get("audit")||[]).forEach(function(a){ rows3.push([CG.fmtFull(a.at),a.who,a.action,a.detail]); });
        CG.exportCSV("cghl-audit.csv", rows3);
      }
    });
  });
};

/* ================================================================
   INIT
   ================================================================ */
(function init(){
  /* theme: saved preference wins, otherwise follow the OS */
  var savedTheme = (CG.store.get("prefs")||{}).theme;
  document.documentElement.setAttribute("data-theme",
    savedTheme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  CG.boot();
  /* merge session-published articles into the newsroom */
  (CG.store.get("published")||[]).forEach(function(a){
    if (!CG.CONTENT.articles.some(function(x){ return x.slug===a.slug; })) CG.CONTENT.articles.unshift(a);
  });
  CG.renderChrome();
  if (!location.hash) location.hash = "#/home";
  CG.router();
  /* dev smoke test: CG.__smoke() renders every route in every role and reports errors */
  CG.__smoke = function(){
    var routes = ["home","schedule","standings","standings?view=league","standings?view=wildcard","teams","players","stats","stats?tab=goalies","stats?tab=teams","awards","awards?tab=potw","awards?tab=season","rankings","news","rulebook","blueprint","signin","search"];
    CG.TEAMS.forEach(function(t){ routes.push("team/"+t.code, "team/"+t.code+"?tab=games", "team/"+t.code+"?tab=stats", "team/"+t.code+"?tab=moves", "team/"+t.code+"?tab=honors", "team/"+t.code+"?season=pre", "team/"+t.code+"?season=pre&tab=games", "team/"+t.code+"?season=pre&tab=stats"); });
    CG.lg.players.forEach(function(p,i){ if (i%12===0) routes.push("player/"+p.id, "player/"+p.id+"?tab=log", "player/"+p.id+"?tab=honors", "player/"+p.id+"?season=pre", "player/"+p.id+"?season=pre&tab=log", "player/"+p.id+"?season=pre&tab=honors"); });
    CG.lg.schedule.forEach(function(g,i){ if (i%9===0) routes.push("matchup/"+g.id); });
    routes.push("hub","hub/availability","hub/lineup","hub/complaints","hub/complaint?id=CG-0142","hub/statsentry","hub/notifications","hub/settings");
    ["","results","codes","presets","schedule","seasons","users","ratings","rankings","awards","complaints","news","homepage","carousel","media","rulebook","automations","data","audit","settings"].forEach(function(s){ routes.push("admin"+(s?"/"+s:"")); });
    var errs = [], count = 0;
    var article0 = CG.CONTENT.articles[0]; routes.push("article/"+article0.slug);
    ["guest","member","mgmt","staff","commish"].forEach(function(role){
      CG.store.set("role", role);
      routes.forEach(function(r){
        try {
          var parts = r.split("?");
          var seg = parts[0].split("/");
          var qs = {};
          (parts[1]||"").split("&").forEach(function(p){ if(!p)return; var x=p.split("="); qs[x[0]]=decodeURIComponent(x[1]||""); });
          var fn = CG.ROUTES[seg[0]] || CG.ROUTES._404;
          var html = fn(seg.slice(1).join("/")||null, qs);
          if (typeof html !== "string" || (html.length<40 && seg[0]!=="hub")) errs.push(role+" /"+r+" -> suspiciously empty");
          count++;
        } catch(e){ errs.push(role+" /"+r+" -> "+e.message); }
      });
    });
    CG.store.set("role","guest");
    return { rendered: count, errors: errs };
  };
})();
