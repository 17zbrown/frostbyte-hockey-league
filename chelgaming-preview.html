CG.CONTENT = {"articles":[{"slug":"week-7-preview-blades-at-vipers","title":"Streak meets streak: Vipers visit Blades in Week 7's marquee matchup","category":"League News","excerpt":"The Vipers bring a four-game win streak and QuickReleaseQi's .932 goaltending to Northshore tonight, where KneeDeepKen and the three-straight-wins Blades are waiting.","author":"M. Callahan — CGHL Newsroom","dateIso":"2026-07-15","featured":true,"body":["The best game of the Week 7 slate needs no dressing up: the Aurora Blades (8-4-0), winners of three straight, welcome the Tucson Vipers (10-2-0), winners of four straight, tonight in the West's heavyweight matchup. Two streaks walk in; only one walks out.","Every path to a Blades win runs through QuickReleaseQi, who has stopped pucks at a .932 clip this season and turned the Tucson net into a no-fly zone. Aurora's counterpunch is KneeDeepKen, whose 13 goals lead the Blades attack. Ken's release against Qi's glove is the matchup within the matchup.","Tucson also gets reinforcements: OpenIceOpie returns tonight after serving a two-game suspension during Week 6. The Vipers won without him, but his physical edge changes how much room Aurora's forwards will get in the middle of the ice.","The stakes are straightforward. A Vipers win keeps daylight between them and the field in the West; a Blades win turns the last four weeks into a genuine division race. Puck drops tonight, and lineups lock 30 minutes before it does."],"relatedTeams":["Aurora Blades","Tucson Vipers"],"tags":["week-7","preview","aurora-blades","tucson-vipers","west-division"]},{"slug":"openiceopie-cleared-to-return-after-suspension","title":"OpenIceOpie cleared to return after two-game suspension","category":"Suspensions","excerpt":"The Vipers' OpenIceOpie has served his two-game Rule 7.4 suspension in full and is eligible to return for tonight's showdown with Aurora.","author":"D. Kowalski — CGHL Newsroom","dateIso":"2026-07-14","featured":false,"body":["OpenIceOpie is back. The Tucson Vipers' OpenIceOpie has completed the two-game suspension handed down under Rule 7.4 and is eligible to return tonight when the Vipers visit the Aurora Blades.","The ban stemmed from a checking-from-behind incident that also drew a game misconduct. League player safety reviewed the play, ruled it a clear Rule 7.4 violation, and both games of the suspension were served during Week 6.","Tucson never missed a beat in the interim, extending its win streak to four, but Opie's return adds bite to a lineup that has leaned on structure and goaltending. Expect the Blades to test his discipline early and often.","The league office reiterated that checking from behind remains a point of emphasis this season. Repeat violations carry escalating discipline, and every ruling is published in full in the league's discipline log."],"relatedTeams":["Tucson Vipers","Aurora Blades"],"tags":["discipline","rule-7-4","suspension","tucson-vipers"]},{"slug":"commissioner-update-week-8-availability-lineup-lock","title":"Commissioner update: Week 8 availability due Sunday, lineups lock at T-30","category":"Commissioner Update","excerpt":"Week 8 availability is due Sunday at 8 PM ET, lineups lock 30 minutes before puck drop, and game codes release at T-30.","author":"R. Osei — CGHL Newsroom","dateIso":"2026-07-14","featured":false,"body":["Commissioner zackbrown17 posted a mid-season housekeeping notice Tuesday, and every captain should read it twice. The headline item: Week 8 availability is due Sunday at 8:00 PM ET, no exceptions.","Lineup rules were also spelled out. Rosters for each game lock 30 minutes before puck drop, and no substitutions or lineup edits will be processed after the lock.","Game codes follow the same rhythm: codes release at T-30, thirty minutes before scheduled puck drop, and go out to team captains through the usual channels. Captains are responsible for getting lobbies up on time.","\"We're six weeks in and the product is good — let's keep it tight,\" zackbrown17 wrote in the notice. Questions about availability or scheduling should go to the league office before Sunday's deadline."],"relatedTeams":[],"tags":["commissioner","availability","lineup-lock","game-codes","week-8"]},{"slug":"week-7-power-rankings","title":"Week 7 power rankings: Breakers stay first, Blades jump to third","category":"Power Rankings","excerpt":"The Breakers hold No. 1 by the thinnest of margins, Tucson lurks at No. 2, Aurora climbs to third, and the free-falling Yetis land at No. 8.","author":"M. Callahan — CGHL Newsroom","dateIso":"2026-07-13","featured":false,"body":["Week 7 is here, and the top of the rankings is a coin flip we refuse to flip. The Circuit Breakers hold at No. 1, the Tucson Vipers sit at No. 2, and both are 10-2-0 with legitimate claims to the crown.","1. Circuit Breakers (10-2-0). Saturday's 5-0 shutout of the Yetis was the most complete game any CGHL team has played this season. TapeToTapeTee's nine-point week and HatTrickHavoc's shutout give the Breakers the edge — for now.","2. Tucson Vipers (10-2-0). Four straight wins and a goaltender in QuickReleaseQi stopping pucks at .932 with a 1.40 goals-against average. If they win at Aurora this week, the top spot is theirs to argue for.","3. Aurora Blades (8-4-0, up). Three straight wins push the Blades up to No. 3, with KneeDeepKen's 13 goals leading the charge. Wednesday at Lights Center tells us whether they belong here.","8. Steel Yetis (down). Six straight losses, a 5-0 shutout defeat, and no obvious fix in sight drop the Yetis to the basement of these rankings. The talent is still there; the results are not."],"relatedTeams":["Circuit Breakers","Tucson Vipers","Aurora Blades","Steel Yetis"],"tags":["power-rankings","week-7","standings"]},{"slug":"week-6-honors-tapetotapetee-quietroomquinn","title":"Week 6 honors: TapeToTapeTee's nine-point tear, QuietRoomQuinn shuts the door","category":"Awards","excerpt":"A nine-point week earns TapeToTapeTee top honors, while QuietRoomQuinn's goaltending fuels the Blades' three-game surge.","author":"R. Osei — CGHL Newsroom","dateIso":"2026-07-13","featured":false,"body":["TapeToTapeTee is your Week 6 Player of the Week, and it was not close. The Circuit Breakers star piled up nine points on the week, dragging an already dangerous Breakers attack to another level.","The exclamation point came Saturday: two goals and an assist in a 5-0 dismantling of the Steel Yetis. Every shift Tee took this week produced something, and the Breakers' 10-2-0 record owes plenty to it.","Between the pipes, the honor goes to QuietRoomQuinn, the backbone of the Aurora Blades' three-game win streak. Quinn was calm, square, and stingy all week, and the Blades' charge toward the top of the West starts in their crease.","Weekly honors are selected by the CGHL newsroom at the close of each week's games. Week 7 candidates, consider the bar set."],"relatedTeams":["Circuit Breakers","Aurora Blades"],"tags":["player-of-the-week","awards","week-6","circuit-breakers","tundra-wolves"]},{"slug":"week-6-wrap-two-leaders-one-skid-one-revival","title":"Week 6 wrap: two 10-2-0 division leaders, a six-game skid, and a Wolves revival","category":"League News","excerpt":"Six weeks in, the Vipers and Breakers are deadlocked at 10-2-0 atop their divisions, the Yetis have lost six straight, and the Tundra Wolves are quietly the hottest team in the East.","author":"M. Callahan — CGHL Newsroom","dateIso":"2026-07-12","featured":true,"body":["Six weeks are in the books, and the CGHL standings have a symmetry problem. The Tucson Vipers and the Circuit Breakers both sit at 10-2-0, each perched on top of their division, and neither shows any sign of slowing down. If the season ended today, a Vipers-Breakers final would surprise exactly no one.","The Breakers closed the week loudest, blanking the Steel Yetis 5-0 on Saturday behind an 18-save shutout from HatTrickHavoc and a two-goal, one-assist night from TapeToTapeTee. Out West, the Vipers kept stacking wins and carry a four-game streak into Week 7. Tucson's formula has not changed all season: tight checking and QuickReleaseQi slamming the door.","Then there are the Steel Yetis, whose season has come apart at the seams. Saturday's shutout loss stretched their skid to six straight, and a team that opened the year with contender talk now heads into Week 7 searching for anything that resembles its early form.","The week's quietest good news belongs to the Tundra Wolves, winners of three straight in the East. WristerWes has orchestrated the run, with UpperNinety and ZambroniZed burying two goals apiece in Saturday's 6-2 statement over Polar Reign — and the Wolves suddenly look like the team most likely to make the Breakers sweat. Four weeks remain, and the middle of both divisions is very much alive."],"relatedTeams":["Tucson Vipers","Circuit Breakers","Steel Yetis","Tundra Wolves"],"tags":["week-6","standings","recap","division-race"]},{"slug":"quickreleaseqi-nine-wins-one-loss","title":"Nine wins, one loss: how QuickReleaseQi became the CGHL's toughest goalie to beat","category":"Player Feature","excerpt":"Nine wins, one loss, a 1.40 goals-against average, and a .932 save percentage: QuickReleaseQi's first half has been the story of the season.","author":"D. Kowalski — CGHL Newsroom","dateIso":"2026-07-12","featured":false,"body":["The numbers read like a typo: 9-1, a 1.40 goals-against average, and a .932 save percentage. QuickReleaseQi is not just the best goalie in the CGHL through six weeks — the gap between Qi and the field is the story of the season's first half.","Watch a Vipers game and the pattern repeats: clean positioning, an economy of movement, and a glove that snaps shut before shooters finish their follow-through. Nothing about the style is flashy until you realize how rarely a rebound hits the ice.","Tucson has returned the favor by building a structure that funnels shots to the outside, and the result is a 10-2-0 record and a four-game win streak heading into Week 7. Ask anyone in the Vipers room where it starts, and the answer is the same: the crease.","The stiffest test of the season arrives Wednesday in the form of the Aurora Blades and KneeDeepKen, who has 13 goals and no respect for hot goalies. If Qi holds serve, the conversation shifts from great season to historic one."],"relatedTeams":["Tucson Vipers"],"tags":["goaltending","tucson-vipers","player-feature","quickreleaseqi"]},{"slug":"recap-breakers-5-yetis-0","title":"Breakers 5, Yetis 0: HatTrickHavoc's 18-save shutout deepens the skid","category":"Game Recap","excerpt":"HatTrickHavoc stopped all 18 shots and TapeToTapeTee had two goals and an assist as the Breakers blanked the skidding Yetis 5-0.","author":"R. Osei — CGHL Newsroom","dateIso":"2026-07-11","featured":false,"body":["The Circuit Breakers did not just beat the Steel Yetis on Saturday; they erased them. A 5-0 final, an 18-save shutout for HatTrickHavoc, and another statement from the East's top team.","TapeToTapeTee led the offense with two goals and an assist, capping a nine-point week that has Player of the Week written all over it. The Breakers scored early, defended in layers, and never let the game breathe.","For the Yetis, the loss was a sixth straight, and the manner of it stung more than the number. Eighteen shots on goal, none past HatTrickHavoc, and long stretches where the Breakers simply toyed with the puck.","The Breakers sit at 10-2-0 atop the East. The Yetis get a week to find themselves before the schedule shows any mercy — and on current form, it won't."],"relatedTeams":["Circuit Breakers","Steel Yetis"],"tags":["game-recap","shutout","circuit-breakers","steel-yetis","week-6"]},{"slug":"rookie-watch-bennybiscuit-wraparoundwill","title":"Rookie watch: BennyBiscuit and WraparoundWill are separated by a single point","category":"Player Feature","excerpt":"Circuit Breakers defenseman BennyBiscuit (17 points) and Polar Reign winger WraparoundWill (16) have turned the rookie race into a weekly photo finish.","author":"D. Kowalski — CGHL Newsroom","dateIso":"2026-07-09","featured":false,"body":["The CGHL's rookie race has come down to a single point. BennyBiscuit, the Circuit Breakers' rookie defenseman, leads all first-year players with 17 points; WraparoundWill, Polar Reign's rookie right wing, sits one back at 16.","Biscuit's production is the more surprising of the two — 17 points from the blue line would be notable for a veteran, let alone a rookie logging big minutes on the East's best team. The Breakers trust him in every situation, and it shows.","Will's game is louder. True to the name, he hunts wraparounds and net-front chaos, and his 16 points have come with a flair that makes Polar Reign appointment viewing. He is the reason to watch Reign games down the stretch.","Four weeks remain to settle it. A defenseman versus a winger, a system player versus an agent of chaos — whichever way it breaks, the rookie class of Season 1 has already set the standard."],"relatedTeams":["Circuit Breakers","Polar Reign"],"tags":["rookies","circuit-breakers","polar-reign","player-feature"]},{"slug":"scoring-race-icepickizzy-puckp1rate","title":"The scoring race: IcePickIzzy's 21 points, PuckP1rate's clean pursuit","category":"League News","excerpt":"IcePickIzzy has ground out 21 points on a .500 Icehawks team; PuckP1rate is one behind with zero penalty minutes. Two very different ways to chase a scoring title.","author":"R. Osei — CGHL Newsroom","dateIso":"2026-07-08","featured":false,"body":["The CGHL scoring race is a study in opposites. IcePickIzzy leads the league with 21 points, ground out shift by shift for a Midnight Icehawks team stuck at .500; PuckP1rate of the Circuit Breakers sits one back at 20 — without taking a single penalty minute all season.","Izzy's points are the heavy kind. Net-front screens, won battles along the wall, greasy rebound goals — nothing about the league lead has come easy, and on a .500 team, nobody is padding Izzy's totals. Take Izzy off the Icehawks and the season looks very different.","P1rate's pursuit is almost the opposite: 20 points of clean hands and cleaner positioning, with zero PIM through six weeks. In a league that tracks discipline as closely as this one does, a scorer who never visits the box is its own kind of weapon.","Four weeks remain, one point separates them, and the two share the East — starting tonight, when the Breakers visit Duskmoor and the race goes head to head. Pick a side: the grinder or the gentleman."],"relatedTeams":["Midnight Icehawks","Tucson Vipers"],"tags":["scoring-race","midnight-icehawks","tucson-vipers","stats"]}],"rulebook":{"chapters":[{"num":1,"title":"Membership & conduct","sections":[{"id":"1.1","title":"Eligibility and registration","paragraphs":["Membership in the Chel Gaming Hockey League (CGHL) is open to players who complete registration through the league's official channels, link a valid EA account and gamertag, and join the league Discord server. A player is not eligible to appear in a CGHL game until the league office has confirmed their registration and assigned them to a club or to the free agent pool.","Each player may hold exactly one CGHL identity. Registering, playing under, or lending out a secondary account — including playing under another member's account for any reason — is account misrepresentation and is subject to discipline under Chapter 7. Players are responsible for keeping their gamertag and contact information current with the league office; games played under an unregistered or outdated gamertag may be ruled unofficial."]},{"id":"1.2","title":"Code of conduct","paragraphs":["All members — players, captains, managers, and league staff — are expected to compete hard and act like professionals. Harassment, hate speech, threats, doxxing, and targeted abuse are prohibited in all league spaces, including in-game chat, Discord, streams of league games, and direct messages arising out of league business. The standard applies whether or not the conduct occurs during a scheduled game.","Unsportsmanlike conduct includes, without limitation: deliberate goaltender interference intended to injure or provoke, quitting a game in progress without cause, stat manipulation, throwing games, and public abuse of officials or opponents. The league office may act on conduct violations on its own initiative; it does not require a formal complaint to open a review."]},{"id":"1.3","title":"League communications","paragraphs":["The CGHL Discord server is the league's official channel of record. Schedule releases, rule changes, disciplinary notices, and game codes are delivered through Discord, and every rostered player is responsible for information posted there. A claim of not having seen an official posting is not a defense to a missed obligation under this rulebook.","Captains serve as the formal point of contact between their club and the league office. Protests, reschedule requests, and roster paperwork must come from a club's captain or designated alternate to be considered filed."]}]},{"num":2,"title":"Rosters & player movement","sections":[{"id":"2.1","title":"Roster composition","paragraphs":["Each club maintains an active roster within the limits published by the league office before the season. The active roster must at all times include enough eligible players to ice a full 6v6 lineup, including a goaltender. Clubs that fall below the minimum through departures or suspensions must notify the league office immediately and restore compliance through the free agent process.","Every player on an active roster must be assigned a primary position group (forward, defense, or goaltender). Position assignments govern lineup verification under Chapter 5 but do not restrict in-game position changes made by the club during play."]},{"id":"2.2","title":"Free agency and signings","paragraphs":["Unrostered registered players are held in the league free agent pool. Clubs sign free agents by filing a signing request with the league office; a signing is effective only once the league office confirms it and updates the official roster. A free agent may not dress for a club before the signing is confirmed, and any game in which an unconfirmed player dresses is subject to forfeiture under Chapter 3.","Contact with rostered players of other clubs for the purpose of inducing a departure — tampering — is prohibited and is subject to discipline under Chapter 7."]},{"id":"2.3","title":"Trades","paragraphs":["Clubs may trade rostered players by mutual agreement of both captains. Both clubs must file matching trade confirmations with the league office, and the trade takes effect only when the league office posts it to the official transaction log. Players acquired by trade are eligible for their new club beginning with that club's next scheduled game after posting.","The league office may void any trade it determines was made in bad faith, including trades intended to circumvent roster limits, manipulate playoff seeding, or park players on behalf of another club."]},{"id":"2.4","title":"Movement deadline","paragraphs":["All player movement — signings, trades, and releases — closes at the league-posted roster deadline announced before the season. After the deadline, rosters are frozen through the end of the playoffs, except that the league office may authorize an emergency goaltender signing for a club unable to ice a goaltender through no fault of its own."]}]},{"num":3,"title":"Scheduling, forfeits & reschedules","sections":[{"id":"3.1","title":"The official schedule","paragraphs":["The CGHL regular season runs ten weeks, with matchups and puck-drop times published on the official league schedule. The schedule as posted by the league office is binding on all clubs. Puck-drop times are stated in Eastern Time unless otherwise noted, and clubs are responsible for converting to their local time.","Clubs are expected to be lobby-ready at the scheduled puck-drop time. Lobby-ready means a full eligible lineup is online, in the league Discord, and prepared to enter the private game upon code release under Rule 4.2."]},{"id":"3.2","title":"Forfeits and the grace period","paragraphs":["A club that cannot ice an eligible lineup at the scheduled puck-drop time is granted a grace period of fifteen (15) minutes. If the club still cannot ice an eligible lineup when the grace period expires, the game is declared a forfeit and recorded as a regulation loss for the offending club. If neither club can ice an eligible lineup at the expiration of the grace period, the game is recorded as a double forfeit.","Invoking the grace period is not penalty-free as a habit: clubs that repeatedly rely on the grace period may be referred to the league office for review under Chapter 7. A club that knows in advance it cannot play must pursue a reschedule under Rule 3.3 rather than allowing a forfeit to occur."]},{"id":"3.3","title":"Reschedules","paragraphs":["A game may be rescheduled only by written agreement of both captains, filed with and approved by the league office before the originally scheduled puck drop. The league office will not approve reschedules that push a game past the end of the week in which it was originally scheduled unless exceptional circumstances exist.","Where the clubs cannot agree, the game stands as scheduled. The league office may on its own authority move a game for league-wide technical outages, EA server failures, or other events outside the clubs' control."]}]},{"num":4,"title":"Game settings & servers","sections":[{"id":"4.1","title":"Official game configuration","paragraphs":["All CGHL games are played in EA Sports NHL 26 as 6v6 club games using the league-published settings sheet, which forms part of this rulebook by reference. Games played on any other settings are unofficial and will be replayed on correct settings at the league office's direction.","Effective with rulebook version 1.2, games tied at the end of regulation proceed to a five (5) minute, 3-on-3 sudden-death overtime period. If the game remains tied at the end of overtime, it is decided by a shootout conducted under the settings sheet. Regular season and playoff overtime formats may differ only where this rulebook expressly says so."]},{"id":"4.2","title":"Private game codes","paragraphs":["League games are played in private lobbies secured by a game code issued by the league office. Codes are released to the two competing clubs' captains no earlier than thirty (30) minutes before the scheduled puck drop.","Game codes are confidential. A code may be shared only with rostered players dressing in that game and may never be posted publicly — including in open Discord channels, streams, social media, or any other public venue. Publicly sharing a game code, or admitting a non-rostered player to a league lobby, is a conduct violation subject to discipline under Chapter 7, and the league office may order the game replayed on a fresh code."]},{"id":"4.3","title":"Disconnects and rejoins","paragraphs":["If a player disconnects during play, the game continues; clubs are expected to play through individual drops. The disconnected player may rejoin the same game in progress at the next stoppage. A club may not use a disconnect, real or feigned, to gain a stoppage, delay, or matchup advantage.","If the lobby itself fails — a full crash or an EA server outage affecting both clubs — captains must capture evidence of the score and game clock at failure. The league office will order the game resumed from the recorded score and time where feasible, and replayed in full where it is not."]},{"id":"4.4","title":"Connection standards","paragraphs":["Players are expected to compete on a stable connection. Persistent, game-affecting lag attributable to a single player may be reviewed by the league office, which may require the player to sit until the issue is resolved. Deliberate manipulation of one's connection to induce lag is cheating and is subject to discipline under Chapter 7."]}]},{"num":5,"title":"Availability & lineups","sections":[{"id":"5.1","title":"Weekly availability","paragraphs":["Every rostered player must submit weekly availability for the upcoming game week through the league's availability system no later than Sunday at 8:00 PM Eastern Time. Availability submitted after the deadline is accepted at the captain's discretion for lineup purposes but is recorded as late by the league office.","Captains are responsible for confirming that their club's availability picture supports an eligible lineup for each scheduled game. A club that discovers an availability shortfall after the Sunday deadline must pursue a reschedule under Rule 3.3 without delay; waiting until game night is not a defense to a forfeit."]},{"id":"5.2","title":"Eligible lineups","paragraphs":["A lineup is eligible when every dressed player is on the club's confirmed active roster, is not under suspension, and satisfies the position requirements of the settings sheet, including a rostered goaltender. Dressing an ineligible player results in forfeiture of the game in which the player dressed, without prejudice to further discipline under Chapter 7."]},{"id":"5.3","title":"Lineup lock","paragraphs":["Lineups lock thirty (30) minutes before the scheduled puck drop. After lock, a club may substitute a player only for a genuine emergency — a sudden disconnection, hardware failure, or personal emergency — and only with a rostered, otherwise-eligible player, reported to the league office before the game begins.","The locked lineup is the lineup of record for statistics under Chapter 6 and for eligibility review. Discrepancies between the locked lineup and the players who actually appeared are investigated by the league office, and unexplained discrepancies are treated as dressing an ineligible player under Rule 5.2."]}]},{"num":6,"title":"Statistics & verification","sections":[{"id":"6.1","title":"The official record","paragraphs":["The league's published standings, statistics, and transaction log constitute the official record of the CGHL. In any conflict between the official record and a club's own records, EA's in-game screens, or third-party trackers, the official record controls once the league office has verified the game under this chapter."]},{"id":"6.2","title":"Submission and evidence","paragraphs":["Immediately following each game, the home club's captain must submit the final score and box score to the league office through the designated reporting channel, accompanied by end-of-game screenshots or equivalent capture showing the score and player statistics. The away club's captain must confirm or dispute the submission.","Clubs must retain their game evidence through the end of the season. Games for which no evidence can be produced are recorded at the league office's discretion based on the best available information, and repeated failures to submit evidence are subject to discipline under Chapter 7."]},{"id":"6.3","title":"Corrections and disputes","paragraphs":["A club that believes the official record is wrong must file a correction request with the league office, identifying the game and the specific entry disputed and attaching supporting evidence. The league office rules on correction requests and its statistical rulings are final, except that a ruling which itself imposes discipline may be appealed under Rule 7.6.","Statistics accrued through verified manipulation — including arranged goals, deliberate own-goals, or padding against a complicit opponent — will be struck from the record, and the players and clubs involved referred for discipline under Chapter 7."]}]},{"num":7,"title":"Discipline, suspensions & appeals","sections":[{"id":"7.1","title":"Disciplinary authority","paragraphs":["The league office holds exclusive authority to investigate suspected violations of this rulebook and to impose discipline on players, captains, and clubs. The league office may act on a filed complaint, an official's report, or its own observation, and may review any league game in full, including recorded footage and Discord communications in league spaces.","Discipline is corrective, not merely punitive: sanctions are set to protect competitive integrity and member safety, with the player's history and the harm caused weighed in every decision."]},{"id":"7.2","title":"Classes of sanction","paragraphs":["Available sanctions include, in escalating order: formal warning, single-game suspension, multi-game suspension, forfeiture of games or statistics, suspension for the remainder of the season including playoffs, and expulsion from the league. Sanctions may be combined where a single course of conduct violates multiple rules.","A suspended player may not dress, appear in a league lobby, or serve as a club's point of contact for game operations while the suspension runs. Suspensions carry across season boundaries where unserved games remain."]},{"id":"7.3","title":"In-game misconduct","paragraphs":["Conduct penalized within the game by EA's rule engine is ordinarily punished by the game itself. The league office layers supplemental discipline on top of in-game penalties where the conduct is dangerous, repeated, or targeted — the fact that a penalty was served in-game does not exhaust the league's disciplinary interest in it."]},{"id":"7.4","title":"Dangerous contact","paragraphs":["Dangerous contact is any deliberate act whose evident purpose is to injure, intimidate, or provoke rather than to play the puck. It expressly includes checking an opponent from behind — particularly into the boards or the goal frame — and all post-whistle misconduct, including hits, cross-checks, slew-foots, and goaltender contact delivered after play has been blown dead.","The baseline sanction for a verified act of dangerous contact is a two (2) game suspension. The league office adjusts upward from the baseline for aggravating factors — targeting a goaltender, repetition within the same game, prior history under this rule, or conduct that continues after a warning — and may reduce below the baseline only in documented, exceptional circumstances. Effective version 1.2 of this rulebook, the baseline is mandatory: a verified violation of this rule may not be resolved by warning alone.","Captains share responsibility under this rule. A captain who directs, encourages, or conspicuously tolerates dangerous contact by their players is subject to discipline as if they had committed the act."]},{"id":"7.5","title":"Repeat offenses","paragraphs":["A player's full disciplinary history in the CGHL is before the league office in every matter. Repeat violations of the same rule presumptively draw a longer suspension than the prior sanction for that rule, and a pattern of violations across different rules may itself justify a season-length suspension or expulsion even where no single incident would."]},{"id":"7.6","title":"Appeals","paragraphs":["A player or club sanctioned under this chapter may appeal by filing a written appeal with the league office within forty-eight (48) hours of the sanction being posted. The appeal must identify the ruling appealed, state the grounds — factual error, misapplication of a rule, or disproportionate sanction — and attach any evidence not already before the league office. Sanctions not appealed within the 48-hour window are final.","Appeals are decided by a panel that excludes any official who imposed the original sanction. Filing an appeal does not stay a suspension: the sanction runs while the appeal is pending, and games already served are credited if the appeal succeeds. The panel may uphold, reduce, or vacate a sanction; it may increase a sanction only where the appeal itself reveals misconduct not previously known."]}]},{"num":8,"title":"Playoffs & seeding","sections":[{"id":"8.1","title":"Qualification and seeding","paragraphs":["At the conclusion of the regular season, the top three (3) clubs in each division qualify for the CGHL playoffs, producing a six-club field. The two division winners are awarded the top two seeds: seeds 1 and 2 are assigned to the East and West division champions, ordered between themselves by overall regular-season record. The remaining four qualifiers are seeded 3 through 6 by overall regular-season record without regard to division.","Seeding is fixed when the league office certifies the final standings and does not re-seed between rounds."]},{"id":"8.2","title":"Tiebreakers","paragraphs":["Ties in the standings — for division titles, playoff berths, or seeding — are broken in the following order: head-to-head record between the tied clubs; regulation wins; goal differential across all regular-season games; goals scored; and, if still tied, a one-game play-in scheduled by the league office. Forfeited games count as regulation results for all tiebreaker purposes."]},{"id":"8.3","title":"Playoff play","paragraphs":["Playoff rounds are contested as series in the format published with the playoff schedule, with the higher seed holding home designation for scheduling and reporting purposes. All regular-season rules apply in the playoffs except where this rulebook or the published playoff format expressly provides otherwise; there are no shootouts in playoff games, with tied games continuing in successive overtime periods under the settings sheet until decided.","Playoff eligibility is limited to players who were on their club's active roster at the movement deadline under Rule 2.4 and who are not under suspension for the game in question."]}]},{"num":9,"title":"Awards & honors","sections":[{"id":"9.1","title":"League awards","paragraphs":["The CGHL confers end-of-season awards recognizing individual and club excellence, including most valuable player, best goaltender, best defenseman, and the league championship trophy awarded to the playoff champion. The full slate of awards for a season is published by the league office before the final week of the regular season."]},{"id":"9.2","title":"Selection and voting","paragraphs":["Individual awards are selected by a vote conducted by the league office among club captains and league staff, informed by the official statistical record under Chapter 6. No voter may cast a first-place vote for a member of their own club. The league office publishes voting results with the award announcements.","Statistical titles — scoring leaders and goaltending leaders — are determined directly from the official record and are not subject to vote. Minimum-appearance thresholds for goaltending titles are published with the settings sheet."]},{"id":"9.3","title":"Eligibility and forfeiture of honors","paragraphs":["A player serving a suspension of season length or longer is ineligible for individual awards for that season. The league office may strip an award or honor, before or after conferral, where the underlying performance is found to have involved a verified violation of Chapter 6 or Chapter 7."]}]},{"num":10,"title":"Definitions","sections":[{"id":"10.1","title":"Terms of art","paragraphs":["As used in this rulebook: \"league office\" means the CGHL commissioner and staff acting in their official capacity; \"club\" means a member team of the CGHL together with its captain, managers, and rostered players; \"captain\" includes a club's designated alternate when acting in the captain's place; \"puck drop\" means the scheduled start time of a game as published on the official schedule; \"dress\" means to appear in a league lobby as a participant in a game; \"game week\" means the scheduling week as delineated on the official schedule; and \"settings sheet\" means the league-published game configuration document incorporated by Rule 4.1.","\"Eligible lineup\" carries the meaning given in Rule 5.2. \"Dangerous contact\" carries the meaning given in Rule 7.4. \"Official record\" carries the meaning given in Rule 6.1."]},{"id":"10.2","title":"Interpretation and amendment","paragraphs":["Chapter and section headings are for convenience and do not limit the text. Where this rulebook is silent, the league office rules in the manner that best protects competitive integrity, and such rulings have the force of the rulebook until it is amended. Time references are Eastern Time unless stated otherwise, and stated time periods include weekends and holidays.","This rulebook may be amended by the league office at any time. Amendments are published with a version number and effective date, take effect prospectively from the stated date, and do not reopen games or rulings completed under a prior version except where the amendment expressly says so."]}]}],"changelog":[{"version":"1.2","dateIso":"2026-07-01","summary":"Overtime format changed to a 5-minute 3-on-3 sudden-death period followed by a shootout (Rule 4.1). Rule 7.4 (Dangerous contact) strengthened: the 2-game baseline suspension is now mandatory for verified violations and may not be resolved by warning alone."},{"version":"1.1","dateIso":"2026-06-10","summary":"Clarified disconnect and rejoin procedure (Rule 4.3): individual drops play on with rejoin at the next stoppage; full lobby failures resume from the recorded score and clock where feasible."},{"version":"1.0","dateIso":"2026-05-20","summary":"Initial publication of the CGHL Official Rulebook for Season 1."}]},"rankings":{"intro":"Week 7 opens with a dead heat at the top of the board: Circuit Breakers and Tucson Vipers both sit 10-2-0, separated only by the Breakers' plus-28 goal differential against Tucson's plus-16. Behind them, the Aurora Blades have won three straight to climb to No. 3, and the Steel Yetis — losers of six in a row — tumble two spots to the basement. The gap between the league's top two and everyone else is starting to look like a moat.","entries":[{"code":"CBR","comment":"The Breakers hung five on the Yetis and never let them breathe — HatTrickHavoc stopped all 18 shots he saw while TapeToTapeTee went 2G 1A. With a plus-28 goal differential and three of the league's top five scorers, this is still the deepest lineup in the CGHL.","keyPlayer":"PuckP1rate — 20 points in just 9 games on 28.2% shooting"},{"code":"TUC","comment":"Four straight wins for the Vipers, the latest a workmanlike 3–1 handling of the Icehawks with KillerCrossover and JackpotJett each posting a goal and a helper. The complication: OpenIceOpie sits two games for checking from behind under Rule 7.4, thinning the lineup at the worst possible time.","keyPlayer":"QuickReleaseQi — 9-1 with a league-best 1.40 GAA and .932 save percentage"},{"code":"AUR","comment":"Three straight wins vault Aurora up a spot, capped by a 3–2 escape against Anaheim behind PenaltyKillPax's goal-and-assist night. QuietRoomQuinn has claimed Goalie of the Week honors three times already — Weeks 2, 4 and 6 — and gives this surge real backbone.","keyPlayer":"KneeDeepKen — 13 G leads the club"},{"code":"ICE","comment":"Back-to-back losses cost the Icehawks a spot, the latest a 3–1 defeat to the Vipers. At 6-6-0 they still hold second in the East, but the gap to Circuit Breakers has stretched to eight points and the margin for error is gone.","keyPlayer":"IcePickIzzy — league-best 21 points (12 G, 9 A) in 10 games"},{"code":"POL","comment":"Polar Reign has dropped three straight, including a 6–2 blowout at the hands of a Tundra Wolves side that entered the week last in these rankings. A minus-8 differential says this roster is better than 5-7-0 — two of the league's top ten scorers wear the crown.","keyPlayer":"ShortSideSho — 17 points on a 27.3 shooting percentage"},{"code":"TUN","comment":"Nobody is hotter at the bottom of the board — the Wolves have won three straight and jump two spots after burying Polar Reign 6–2, with UpperNinety and ZambroniZed scoring twice apiece. The 3-8-1 record still drags, but the last week looks like a different team.","keyPlayer":"WristerWes — 14 points, the only Wolf among the league's top scorers"},{"code":"ANA","comment":"The Ducks pushed surging Aurora to the wire in a 2–3 loss, but the slide is now four games. A league-worst minus-20 differential and 49 goals against tell the story: this club can create chances but cannot keep the puck out of its own net.","keyPlayer":"SauceBoss77 — two assists in the near-upset of the Blades"},{"code":"YET","comment":"Shut out 5–0 by Circuit Breakers, the Yetis have dropped six straight and fall two spots to the basement. A goaltending committee that has yet to put a single name on the league's goalie leaderboard, paired with just 29 goals in 12 games, leaves nowhere to hide.","keyPlayer":"—"}],"matchupPreview":"Tonight's Week 7 headliner sends the 10-2-0 Tucson Vipers into Aurora to face the 8-4-0 Blades, winners of three straight. It doubles as a goaltending showcase: QuickReleaseQi (9-1, .932, league-best 1.40 GAA) against QuietRoomQuinn, already a three-time Goalie of the Week this season. Tucson also gets OpenIceOpie back from his two-game suspension tonight, while Aurora counters with KneeDeepKen and his club-leading 13 goals. A Blades win cuts the West gap to two points; a Vipers win stretches the cushion to six and runs their streak to five."},"ops":{"complaints":[{"caseId":"CG-0142","category":"Disconnect dispute","filedBy":"FiveHoleFinn","against":"—","summary":"Week 5 mid-game disconnect — score rolled back per Rule 3","detail":"FiveHoleFinn (Circuit Breakers winger) reported that the lobby dropped mid-game during Wednesday's Week 5 matchup and that the score at the moment of the disconnect was in dispute. Both clubs were asked to submit lobby screenshots and connection logs from the restart so officials could reconstruct the game state.","status":"Resolved","confidential":false,"assignedTo":"RefCam_Official","decision":"Full lobby failure confirmed from logs and both captains' screenshots. Per the disconnect procedure (Rule 4.3), the game was resumed from a fresh lobby with the score and clock carried forward from the point of failure. The final result stands and the standings reflect it. No fault assigned to either club.","timeline":[{"dateIso":"2026-07-02","who":"FiveHoleFinn","entry":"Case submitted: lobby dropped mid-game in Wednesday's Week 5 matchup; score at the time of the disconnect is disputed."},{"dateIso":"2026-07-02","who":"RefCam_Official","entry":"Case assigned and moved to under review. Lobby logs pulled — the home club's timeline matches the connection data, and a Rule 4.3 rollback looks clean. Drafting the decision pending club uploads.","internal":true},{"dateIso":"2026-07-03","who":"RefCam_Official","entry":"More information requested: both clubs asked to upload lobby screenshots and connection logs from the restart."},{"dateIso":"2026-07-05","who":"RefCam_Official","entry":"Resolved: score rolled back to the last completed period per Rule 4.3 and the remainder replayed. Decision published to both clubs."}]},{"caseId":"CG-0147","category":"Gameplay violation","filedBy":"TapeToTapeTee","against":"OpenIceOpie (TUC)","summary":"Late hit in Friday's Week 5 game — two-game suspension under Rule 7.4","detail":"TapeToTapeTee filed clips of a late hit delivered well after the puck was gone during Friday's Week 5 game against the Tucson Vipers. Officials pulled footage from both clubs' angles and reviewed the sequence frame by frame before issuing a ruling under Rule 7.4.","status":"Resolved","confidential":false,"assignedTo":"RefCam_Official","decision":"Rule 7.4 violation confirmed on review of footage from both clubs. OpenIceOpie (Tucson Vipers) suspended two games, covering both Week 6 game nights. The suspension was served in full; OpenIceOpie was reinstated July 14 and is eligible for Week 7.","timeline":[{"dateIso":"2026-07-04","who":"TapeToTapeTee","entry":"Case submitted with two clips of the hit from Friday's Week 5 game against Tucson."},{"dateIso":"2026-07-05","who":"RefCam_Official","entry":"Under review: footage requested and received from both clubs; sequence reviewed from both angles."},{"dateIso":"2026-07-06","who":"RefCam_Official","entry":"Resolved: Rule 7.4 violation confirmed. OpenIceOpie suspended two games, covering both Week 6 game nights. Decision published and logged to Transactions."}]},{"caseId":"CG-0151","category":"Harassment","filedBy":"(confidential)","against":"(confidential)","summary":"Confidential harassment report under active review","detail":"A harassment report has been filed through the confidential reporting form. To protect the parties involved, all details are restricted to league staff while the review is active. Updates will be shared directly with the filer.","status":"Under review","confidential":true,"assignedTo":"RefCam_Official","timeline":[{"dateIso":"2026-07-11","who":"(confidential)","entry":"Case submitted through the confidential reporting form."},{"dateIso":"2026-07-12","who":"RefCam_Official","entry":"Case assigned and moved to under review. Details restricted to league staff."}]},{"caseId":"CG-0153","category":"Scheduling issue","filedBy":"ShortSideSho","against":"—","summary":"Request to move Polar Reign's Wednesday Week 8 game","detail":"ShortSideSho (Polar Reign) requests moving the club's Wednesday, July 22 fixture in Week 8, citing a roster availability conflict that would leave Whitecliff short of a full six. Per league policy, a schedule change needs the opposing club's written agreement plus at least two proposed alternative windows inside Week 8.","status":"More information requested","confidential":false,"timeline":[{"dateIso":"2026-07-13","who":"ShortSideSho","entry":"Case submitted: request to move Polar Reign's Wednesday, July 22 game in Week 8 due to a roster availability conflict."},{"dateIso":"2026-07-14","who":"League Office","entry":"More information requested: please provide two alternative windows within Week 8 and written confirmation from the opposing club."}]}],"transactions":[{"dateIso":"2026-06-01","type":"note","team":"LEAGUE","text":"Season 1 rosters finalized. Eight clubs, two divisions, ten weeks. Opening night is Wednesday, June 3 — every roster is locked and loaded."},{"dateIso":"2026-06-17","type":"callup","team":"CBR","text":"HatTrickHavoc has earned a start-share in the Circuit Breakers crease. What began as a spot start is now a rotation — Voltage City's staff confirmed Havoc splits game nights the rest of the way."},{"dateIso":"2026-06-22","type":"callup","team":"POL","text":"Polar Reign open up the crease. Whitecliff confirms a goalie start-share beginning in Week 4 as the club searches for stability in its own end."},{"dateIso":"2026-06-24","type":"callup","team":"TUN","text":"Tundra Wolves call up UpperNinety from the depth chart. Greywater slots the newcomer straight into the game-night rotation for Week 4."},{"dateIso":"2026-06-29","type":"note","team":"AUR","text":"Aurora Blades unveil a Northshore alternate look. The new third jersey debuts at Lights Center in Week 5."},{"dateIso":"2026-07-06","type":"suspension","team":"TUC","text":"OpenIceOpie (Tucson Vipers) suspended two games under Rule 7.4 for a late hit in Friday's Week 5 game. The ban covers both Week 6 game nights. Full decision in case CG-0147."},{"dateIso":"2026-07-08","type":"callup","team":"TUN","text":"ZambroniZed stays up. The depth call-up has run red-hot since arriving, and the Tundra Wolves confirmed Zed keeps a full-time spot in the game-night lineup."},{"dateIso":"2026-07-10","type":"note","team":"YET","text":"Trade request logged in Iron Ridge. A Steel Yetis player has formally asked for a move, and the front office is listening — expect the phones to stay busy as the deadline gets closer."},{"dateIso":"2026-07-13","type":"note","team":"LEAGUE","text":"Week 8 availability window is open. Clubs must submit availability through the manager portal by Sunday, July 19 at 8:00 PM ET."},{"dateIso":"2026-07-14","type":"reinstatement","team":"TUC","text":"OpenIceOpie reinstated after serving the two-game Rule 7.4 suspension in full. Eligible for Wednesday's Week 7 slate."}],"announcements":[{"dateIso":"2026-07-13","title":"Week 8 availability is open","body":"The Week 8 availability window opened today. Owners and GMs: submit your club's availability through the manager portal by Sunday, July 19 at 8:00 PM ET. The Week 8 schedule posts once every club is in — get your windows locked early so we can publish on time. Pending change requests (including any Week 8 moves) will be resolved before the schedule goes final."},{"dateIso":"2026-07-15","title":"Tonight's game codes release 30 minutes before puck drop","body":"Lobby codes for tonight's Week 7 games go out 30 minutes before each scheduled puck drop. Watch your matchup pages — codes appear there first. Keep codes inside your club: sharing a lobby code outside the two rostered teams is a conduct issue. If a code hasn't appeared 15 minutes before your start time, ping the League Office in the Action Center."}],"teamNotes":[{"code":"CBR","line":"East leaders at 9-2-1 with 44 goals in 12 games — SnipeShowVI's league-best 18 set the pace in Voltage City."},{"code":"ICE","line":"Quietly relentless at 8-3-1, a win back of the East lead and refusing to let the Breakers breathe."},{"code":"TUN","line":"A game over .500 at 6-5-1, and the depth is arriving — Greywater's call-ups have given the Wolves real bite."},{"code":"ANA","line":"At 4-7-1 with 28 goals through 12 games, the Ducks' problem isn't effort — it's finish."},{"code":"TUC","line":"The league's measuring stick: 10-1-1, a league-best 49 goals scored and a league-low 25 against."},{"code":"AUR","line":"Second in the West at 7-4-1 and built on structure — Northshore trades chances for control and keeps winning the math."},{"code":"YET","line":"Dead even at 6-6-0 — the only club without an overtime loss — with BarDownBo's 15 goals keeping Iron Ridge in every fight."},{"code":"POL","line":"3-8-1 and retooling on the fly in Whitecliff — 45 goals against says the fix starts in the Reign's (function(){

        "Every player carries a contract with a cap hit and a term of one to three seasons. The league minimum salary is $750,000. A contract that reaches the end of its term returns the player to free agency under Rule 2.2.",
        "Waiving a player clears his cap hit immediately and opens a 24-hour waiver window. A claiming club takes on the player at his pre-waiver salary, reinstated exactly as it stood; a player who clears unclaimed becomes a free agent. A player returning from a league suspension is reinstated at his pre-suspension salary and remaining term.",
        "Cap space, contract values, and trade-block status are confidential team information. They are visible only to a club's management group and the league office, and are covered by the confidentiality standard in Rule 2.3."
      ]
    });
  }
  if (ch2 && !ch2.sections.some(function(s){ return s.id==="2.6"; })){
    ch2.sections.push({
      id:"2.6", title:"Team management structure",
      paragraphs:[
        "Each club is led by an Owner and a General Manager. Together they may appoint one Assistant General Manager. These roles form the club's management group and are the only accounts with access to confidential team tools — the availability grid, the lineup builder, the roster cap sheet, and the Trade Hub.",
        "Management contracts carry fixed cap values: the Owner and the General Manager count $0 against the cap, and the Assistant General Manager (and any additional tertiary management contract) counts a flat $3,000,000. A player is protected while he holds a management role — he may not be waived, and he may not be included in a trade, until the role is vacated.",
        "Managers are held to the activity and on-ice standards the commissioner sets each season — minimum weekly availability and, where applicable, baseline performance thresholds by position. A manager who falls short of those standards may be reviewed and, if warranted, removed and replaced under this chapter.",
        "Trade discussions, offers, and block listings are restricted to the management groups involved and the league office. Carrying that information outside the management group — to players, to rival clubs, or to the public — is a conduct violation under Rule 1.2 and Rule 2.3."
      ]
    });
  }
  var ch8 = rb.chapters.find(function(c){ return c.num===8; });
  if (ch8){
    var s81 = ch8.sections.find(function(s){ return s.id==="8.1"; });
    if (s81 && s81.paragraphs.join(" ").toLowerCase().indexOf("points percentage")<0){

    });

/* ---------- league boot (sim + user-entered results overlay) ---------- */
CG.boot = function(){
  var weights = CG.store.get("weights") || undefined;
  CG.lg = CG.buildLeague({ weights: weights });
  (CG.store.get("results")||[]).forEach(function(en){ CG.applyEnteredResult(CG.lg, en); });
  if ((CG.store.get("results")||[]).length) CG.aggregate(CG.lg, { weights: weights });
  /* commissioner reschedules (future games only) */
  var rs = CG.store.get("resched")||{};
  CG.lg.schedule.forEach(function(g){
    if (rs[g.id] && !CG.lg.results.some(function(r){ return r.id===g.id; })){
      g.at = rs[g.id]; g.rescheduled = true;
    }
  });
  /* tonight's slate always excludes games that now have results (entered mid-demo),
     and the marquee flag is re-picked from what's actually left to play */
  CG.lg.tonight = CG.lg.schedule.filter(function(g){
    return !CG.lg.results.some(function(r){ return r.id===g.id; }) && Math.abs(g.at - CG.lg.demoNow) < 10*3600000;
  });
  var bestT = null;
  CG.lg.tonight.forEach(function(g){
    var v = CG.lg.teams[g.home].pts + CG.lg.teams[g.away].pts;
    if (!bestT || v > bestT.v) bestT = { g:g, v:v };
  });
  CG.lg.tonight.forEach(function(g){ g.feature = bestT && g.id===bestT.g.id; });
  /* commissioner Three-Stars overrides */
  var so = CG.store.get("starsOverride")||{};
  CG.lg.results.forEach(function(r){ if (so[r.id]) r.stars = so[r.id]; });
};
/* commissioner-entered result: synthesize a consistent box score for the given final */
CG.applyEnteredResult = function(lg, en){
  var gm = lg.schedule.find(function(g){ return g.id===en.gameId; });
  if (!gm || lg.results.some(function(r){ return r.id===en.gameId; })) return;
  var rng = CG.makeRng(987000 + parseInt(en.gameId.replace(/\D/g,""),10));
  var res = CG.simGame(gm, lg.byTeam, rng, lg.suspensions);
  /* force the entered final by re-simming until the shape matches or patching */
  var diffH = en.hs - res.score[gm.home], diffA = en.as - res.score[gm.away];
  ["home","away"].forEach(function(side){
    var code = gm[side], want = side==="home"?en.hs:en.as;
    var box = res.box[code];
    var sk = Object.keys(box).filter(function(pid){ return !box[pid].goalie; });
    var cur = sk.reduce(function(s,pid){ return s+box[pid].g; },0);
    while (cur < want){ var pid = sk[Math.floor(rng()*sk.length)]; box[pid].g++; box[pid].shots++; cur++; }
    while (cur > want){
      var withG = sk.filter(function(pid){ return box[pid].g>0; });
      var pid2 = withG[Math.floor(rng()*withG.length)]; box[pid2].g--; cur--;
    }
    /* trim assists to legality */
    var maxA = want*2, curA = sk.reduce(function(s,pid){ return s+box[pid].a; },0);
    while (curA > maxA){ var withA = sk.filter(function(pid){ return box[pid].a>0; });
      var pid3 = withA[Math.floor(rng()*withA.length)]; box[pid3].a--; curA--; }
    res.score[code] = want;
  });
  res.ot = !!en.ot;
  res.reg = {}; res.reg[gm.home] = en.ot ? Math.min(en.hs,en.as) : en.hs; res.reg[gm.away] = en.ot ? Math.min(en.hs,en.as) : en.as;
  /* fix goalie GA/SV vs new score */
  ["home","away"].forEach(function(side){
    var code = gm[side], opp = side==="home"?gm.away:gm.home;
    var box = res.box[code];
    Object.keys(box).forEach(function(pid){
      var b = box[pid]; if (!b.goalie) return;
      b.ga = res.score[opp]; b.sa = Math.max(b.sa, b.ga+4); b.sv = b.sa-b.ga;
      b.w = res.score[code]>res.score[opp]?1:0;
      b.l = (res.score[code]<res.score[opp] && !res.ot)?1:0;
      b.otl = (res.score[code]<res.score[opp] && res.ot)?1:0;
      b.so = (b.ga===0 && b.w)?1:0; b.qs = b.sa>0 && (b.sv/b.sa)>=.885?1:0;
    });
  });
  /* re-award GWG + Three Stars from the PATCHED box (the sim's picks may be stale) */
  [gm.home, gm.away].forEach(function(code){
    var box = res.box[code];
    Object.keys(box).forEach(function(pid){ if (!box[pid].goalie) box[pid].gwg = 0; });
  });
  var winCode = res.score[gm.home] > res.score[gm.away] ? gm.home : gm.away;
  var wScorers = Object.keys(res.box[winCode]).filter(function(pid){ var b=res.box[winCode][pid]; return !b.goalie && b.g>0; });
  if (wScorers.length) res.box[winCode][wScorers[Math.floor(rng()*wScorers.length)]].gwg = 1;
  var cand = [];
  [gm.home, gm.away].forEach(function(code){
    Object.keys(res.box[code]).forEach(function(pid){
      var b = res.box[code][pid];
      var sc = b.goalie ? (b.sv*.09 + b.w*1.2 + b.so*2.2) : (b.g*2.1 + b.a*1.3 + b.shots*.06);
      cand.push({ pid:pid, team:code, score:sc });
    });
  });
  cand.sort(function(a,b){ return b.score-a.score; });
  res.stars = cand.slice(0,3).map(function(c){ return { pid:c.pid, team:c.team }; });
  res.entered = true;
  lg.results.push(res);
};

CG.avatarHtml = function(key){
  var p = CG.PERSONAS[key||CG.role()];
  if (p && p.avatar) return '<img src="'+p.avatar+'" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block">';
  return esc(((p&&p.tag)||"G").slice(0,2).toUpperCase());
};

CG.role   = function(){ return CG.store.get("role") || "guest"; };
CG.persona= function(){ return CG.PERSONAS[CG.role()]; };
CG.me     = function(){ var p = CG.persona(); return p.tag ? CG.lg.players.find(function(x){ return x.tag===p.tag; }) : null; };
CG.can    = function(perm){
  var list = CG.PERMS[perm]||[]; var r = CG.role();
  if (r==="staff"){ /* staff is modular: must also be in persona perms for staff-scoped tools */
    if (["complaints.review","stats.enter","awards.manage"].indexOf(perm)>=0)
      return CG.PERSONAS.staff.perms.indexOf(perm)>=0 || perm==="awards.manage";
  }
  return list.indexOf(r)>=0;
};
CG.setRole = function(r){
  CG.store.set("role", r);
  CG.renderChrome();
  CG.router();
  CG.toast("Now viewing as "+CG.PERSONAS[r].label, "ok");
};

/* ---------- audit ---------- */
CG.audit = function(action, detail){
  var a = CG.store.get("audit")||[];
  a.unshift({ at: CG.now(), who: CG.persona().who, action: action, detail: detail||"" });
  CG.store.set("audit", a.slice(0,200));
};

/* ---------- crest ---------- */
CG.crestSeq = 0;
CG.crest = function(code, size){
  var t = CG.TEAM[code]; if (!t) return "";
  var s = size||28;
  /* clubs with an uploaded logo (from the live site's media library) use it everywhere */
  if (t.logo) return '<img class="crest" src="'+t.logo+'" width="'+s+'" height="'+Math.round(s*1.1)+'" '+
    'style="object-fit:contain" alt="'+esc(t.name)+' logo">';
  var lum = (function(hex){ var c=hex.replace("#",""); return (0.299*parseInt(c.slice(0,2),16)+0.587*parseInt(c.slice(2,4),16)+0.114*parseInt(c.slice(4,6),16))/255; })(t.color);
  var fg = lum > .62 ? "#101519" : "#FFFFFF";
  var id = "cr"+(CG.crestSeq++);
  return '<svg class="crest" width="'+s+'" height="'+Math.round(s*1.1)+'" viewBox="0 0 40 44" role="img" aria-label="'+esc(t.name)+' crest">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+t.color+'"/><stop offset="1" stop-color="'+t.color+'" stop-opacity=".78"/></linearGradient></defs>'+
    '<path d="M3 4 Q3 1.5 5.5 1.5 H34.5 Q37 1.5 37 4 V24 Q37 35 20 42 Q3 35 3 24 Z" fill="url(#'+id+')" stroke="#101519" stroke-width="2"/>'+
    '<text x="20" y="29" text-anchor="middle" font-family="Archivo,sans-serif" font-weight="800" font-size="12.5" letter-spacing="-.3" fill="'+fg+'">'+t.code+'</text></svg>';
};

    '<path d="M35.5 17.4 A13 13 0 1 0 35.5 30.6" fill="none" stroke="#f4f4f0" stroke-width="3.4" stroke-linecap="round"/>'+
    '<path d="M35 24 H28" fill="none" stroke="#ffe500" stroke-width="3.4" stroke-linecap="round"/></svg>';
};

CG.acIndex = function(kinds){
  var out = [];
  if (kinds.indexOf("players")>=0) CG.lg.players.forEach(function(p){
    out.push({ kind:"player", id:p.id, label:p.tag, sub:CG.TEAM[p.team].name+" · "+p.pos+" · #"+p.jersey, team:p.team });
  });
  if (kinds.indexOf("teams")>=0) CG.TEAMS.forEach(function(t){
    out.push({ kind:"team", id:t.code, label:t.name, sub:t.div+" Division · "+t.city, team:t.code });
  });
  return out;
};
CG.attachAC = function(input, opts){
  if (!input || input._acWired) return;
  input._acWired = true;
  opts = opts||{};
  var items = CG.acIndex(opts.kinds||["players","teams"]);
  var wrap = input.parentNode;
  if (getComputedStyle(wrap).position==="static") wrap.style.position="relative";
  var menu = document.createElement("div");
  menu.className = "ac-menu"; menu.hidden = true;
  menu.setAttribute("role","listbox");
  wrap.appendChild(menu);
  var sel = -1, cur = [];
  function place(){
    menu.style.left = input.offsetLeft+"px";
    menu.style.top  = (input.offsetTop + input.offsetHeight + 6)+"px";
    menu.style.width = Math.max(240, input.offsetWidth)+"px";
  }
  function close(){ menu.hidden = true; sel = -1; }
  function paint(){
    if (!cur.length){ close(); return; }
    place(); menu.hidden = false;
    var q = input.value.trim().toLowerCase();
    menu.innerHTML = cur.map(function(it,i){
      var pos = it.label.toLowerCase().indexOf(q);
      var lab = pos>=0
        ? esc(it.label.slice(0,pos))+"<mark>"+esc(it.label.slice(pos,pos+q.length))+"</mark>"+esc(it.label.slice(pos+q.length))
        : esc(it.label);
      return '<button type="button" class="ac-item'+(i===sel?" on":"")+'" role="option" aria-selected="'+(i===sel)+'" data-i="'+i+'">'+
        CG.crest(it.team,20)+'<span style="min-width:0"><b>'+lab+'</b><small>'+esc(it.sub)+'</small></span>'+
        '<span class="chip" style="margin-left:auto;font-size:9px;flex-shrink:0">'+(it.kind==="team"?"Club":"Player")+'</span></button>';
    }).join("");
  }
  function run(){
    var q = input.value.trim().toLowerCase();
    delete input.dataset.acId; delete input.dataset.acKind;
    input.classList.remove("ac-ok");
    if (!q){ cur = []; close(); if (opts.onClear) opts.onClear(); return; }
    cur = items.filter(function(it){ return it.label.toLowerCase().indexOf(q)>=0; }).slice(0,8);
    sel = cur.length ? 0 : -1;
    paint();
  }
  function pick(i){
    var it = cur[i]; if (!it) return;
    input.value = it.label;
    input.dataset.acId = it.id; input.dataset.acKind = it.kind;
    input.classList.add("ac-ok");
    close();
    if (opts.onPick) opts.onPick(it);
  }
  input.setAttribute("autocomplete","off");
  input.setAttribute("aria-autocomplete","list");
  input.addEventListener("input", run);
  input.addEventListener("keydown", function(e){
    if (menu.hidden) return;
    if (e.key==="ArrowDown"){ e.preventDefault(); sel = Math.min(cur.length-1, sel+1); paint(); }
    else if (e.key==="ArrowUp"){ e.preventDefault(); sel = Math.max(0, sel-1); paint(); }
    else if (e.key==="Enter"){ e.preventDefault(); pick(sel<0?0:sel); }
    else if (e.key==="Escape"){ close(); e.stopPropagation(); }
  });
  input.addEventListener("blur", function(){ setTimeout(close, 160); });
  menu.addEventListener("mousedown", function(e){ e.preventDefault(); });
  menu.addEventListener("click", function(e){
    var b = e.target.closest(".ac-item"); if (b) pick(+b.getAttribute("data-i"));
  });
};

/* ---------- toasts / modal / drawer ---------- */
CG.toast = function(msg, kind){
  var el = document.createElement("div");
  el.className = "toast"+(kind==="err"?" err":kind==="ok"?" ok":"");
  el.innerHTML = esc(msg);
  $("#toast-root").appendChild(el);
  setTimeout(function(){ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(function(){ el.remove(); },320); }, 2600);
};
CG.closeOverlay = function(){
  $("#overlay-root").innerHTML=""; document.body.style.overflow="";
  if (CG._lastFocus && document.body.contains(CG._lastFocus)){ try{ CG._lastFocus.focus(); }catch(e){} }
  CG._lastFocus = null;
};
CG.modal = function(title, bodyHtml, footHtml){
  CG._lastFocus = document.activeElement;
  document.body.style.overflow="hidden";
  $("#overlay-root").innerHTML =
    '<div class="ov-bg" data-close></div>'+
    '<div class="modal" role="dialog" aria-modal="true" aria-label="'+esc(title)+'">'+
      '<div class="mo-h"><h3>'+esc(title)+'</h3><button class="icon-btn" data-close aria-label="Close">'+CG.ic("x")+'</button></div>'+
      '<div class="mo-b">'+bodyHtml+'</div>'+
      (footHtml?'<div class="mo-f">'+footHtml+'</div>':"")+
    '</div>';
  var f = $(".modal input,.modal select,.modal textarea,.modal button:not([data-close])"); if (f) f.focus();
};
CG.drawer = function(title, bodyHtml){
  CG._lastFocus = document.activeElement;
  document.body.style.overflow="hidden";
  $("#overlay-root").innerHTML =
    '<div class="ov-bg" data-close></div>'+
    '<div class="drawer" role="dialog" aria-modal="true" aria-label="'+esc(title)+'">'+
      '<div class="dr-h"><h3 class="h-card">'+esc(title)+'</h3><button class="icon-btn" data-close aria-label="Close">'+CG.ic("x")+'</button></div>'+
      '<div class="dr-b">'+bodyHtml+'</div></div>';
  var db = $(".drawer [data-close]"); if (db) db.focus();
};
CG.confirm = function(title, msg, okLabel, fn){
  CG.modal(title, '<p style="color:var(--steel)">'+esc(msg)+'</p>',
    '<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-ink" id="cfOk">'+esc(okLabel)+'</button>');
  $("#cfOk").addEventListener("click", function(){ CG.closeOverlay(); fn(); });
};

/* ---------- theme (set from Settings → Appearance; "auto" follows the OS) ---------- */
CG.theme = function(){ return document.documentElement.getAttribute("data-theme")==="dark" ? "dark" : "light"; };
CG.themePref = function(){ return (CG.store.get("prefs")||{}).theme || "auto"; };
CG.applyTheme = function(pref){
  pref = ["light","dark","auto"].indexOf(pref)>=0 ? pref : "auto";
  var resolved = pref==="auto"
    ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : pref;
  document.documentElement.setAttribute("data-theme", resolved);
  var prefs = CG.store.get("prefs"); prefs.theme = pref; CG.store.set("prefs", prefs);
};
/* live OS-follow while in auto */
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){
  if (CG.themePref()==="auto") CG.applyTheme("auto");
});
CG.ic = function(name, size){
  return '<svg width="'+(size||18)+'" height="'+(size||18)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+CG.IC[name]+'</svg>';
};

CG.exportCSV = function(name, rows){
  var csv = rows.map(function(r){ return r.map(function(c){
    c = String(c==null?"":c); return /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c; }).join(","); }).join("\n");
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
  CG.toast("Exported "+name, "ok");
};
CG.sortTable = function(wrapEl){
  $$("th.sortable", wrapEl).forEach(function(th){
    th.setAttribute("tabindex","0"); th.setAttribute("role","button");
    th.setAttribute("aria-sort", th.classList.contains("sorted") ? (th.classList.contains("asc")?"ascending":"descending") : "none");
  });
  wrapEl.addEventListener("keydown", function(e){
    if ((e.key==="Enter"||e.key===" ") && e.target.closest("th.sortable")){ e.preventDefault(); e.target.closest("th.sortable").click(); }
  });
  wrapEl.addEventListener("click", function(e){
    var th = e.target.closest("th.sortable"); if (!th) return;
    var table = th.closest("table"), tbody = table.tBodies[0];
    var idx = Array.prototype.indexOf.call(th.parentNode.children, th);
    var asc = th.classList.contains("sorted") && !th.classList.contains("asc");
    $$("th", table).forEach(function(x){ x.classList.remove("sorted","asc"); if (x.classList.contains("sortable")) x.setAttribute("aria-sort","none"); });
    th.classList.add("sorted"); if (asc) th.classList.add("asc");
    th.setAttribute("aria-sort", asc?"ascending":"descending");
    var rows = $$("tbody tr", table);
    rows.sort(function(a,b){
      var av = a.children[idx].getAttribute("data-v")||a.children[idx].textContent;
      var bv = b.children[idx].getAttribute("data-v")||b.children[idx].textContent;
      var an = parseFloat(av), bn = parseFloat(bv);
      var cmp = (!isNaN(an)&&!isNaN(bn)) ? an-bn : String(av).localeCompare(String(bv));
      return asc ? cmp : -cmp;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });
};

    title:"Week 8 availability is open", body:"Submit by Sunday 8:00 PM ET (Rule 5.1).", route:"#/hub/availability" });

  var me = CG.me();

      route:"#/hub" });
  }
  if (r==="mgmt" && myGame) n.push({ id:"n-lu", t:Date.parse("2026-07-15T17:30:00-04:00"), icon:"flag",
    title:"Lineup lock at "+CG.fmtTime(myGame.at-30*60000), body:"Submit tonight's lineup before the 30-minute lock (Rule 5.3).", route:"#/hub/lineup" });
  if (r==="staff") n.push({ id:"n-case", t:Date.parse("2026-07-14T15:00:00-04:00"), icon:"flag",
    title:"Case CG-0151 assigned to you", body:"Harassment report — under review. Confidential.", route:"#/hub/complaints" });
  if (r==="commish") n.push({ id:"n-res", t:Date.parse("2026-07-15T19:00:00-04:00"), icon:"gear",

  var extra = (CG.store.get("notifs")[r]||[]);

};
CG.pushNotif = function(icon, title, body, route){
  var all = CG.store.get("notifs"); var r = CG.role();
  (all[r] = all[r]||[]).unshift({ id:"nx"+Date.now(), t:CG.now(), icon:icon, title:title, body:body, route:route });
  CG.store.set("notifs", all);
};
CG.unreadCount = function(){
  var read = CG.store.get("read");
  return CG.baseNotifs().filter(function(n){ return !read[n.id]; }).length;
};

/* ---------- carousel component ---------- */
CG.carousel = function(rootSel, slides, opts){
  var root = $(rootSel); if (!root || !slides.length) return;
  var idx = 0, timer = null, reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  var interval = (opts&&opts.interval)||7000;
  root.innerHTML = '<div class="caro-track">'+
      slides.map(function(s,i){ return '<div class="slide'+(i===0?" on":"")+'" role="group" aria-roledescription="slide" aria-label="Slide '+(i+1)+' of '+slides.length+'">'+s+'</div>'; }).join("")+
    '</div>'+
    '<div class="caro-ctl">'+
      '<div class="caro-dots" role="tablist" aria-label="Slides">'+slides.map(function(_,i){
        return '<button role="tab" aria-selected="'+(i===0)+'" aria-label="Go to slide '+(i+1)+'" data-dot="'+i+'" class="'+(i===0?"on":"")+'"></button>'; }).join("")+'</div>'+
      '<button class="caro-btn" data-prev aria-label="Previous slide">'+CG.ic("back",16)+'</button>'+
      '<button class="caro-btn" data-next aria-label="Next slide">'+CG.ic("arrow",16)+'</button>'+
    '</div>';
  root.setAttribute("tabindex","0");
  root.setAttribute("aria-roledescription","carousel");
  function go(n){
    idx = (n+slides.length)%slides.length;
    $$(".slide",root).forEach(function(el,i){ el.classList.toggle("on", i===idx); });
    $$("[data-dot]",root).forEach(function(d,i){ d.classList.toggle("on", i===idx); d.setAttribute("aria-selected", i===idx); });
  }
  function play(){ if (reduced) return; stop(); timer = setInterval(function(){ go(idx+1); }, interval); }
  function stop(){ if (timer){ clearInterval(timer); timer=null; } }
  root.addEventListener("click", function(e){
    if (e.target.closest("[data-prev]")){ go(idx-1); play(); }
    if (e.target.closest("[data-next]")){ go(idx+1); play(); }
    var d = e.target.closest("[data-dot]"); if (d){ go(+d.getAttribute("data-dot")); play(); }
  });
  root.addEventListener("keydown", function(e){
    if (e.key==="ArrowLeft"){ e.preventDefault(); go(idx-1); }
    if (e.key==="ArrowRight"){ e.preventDefault(); go(idx+1); }
  });
  root.addEventListener("mouseenter", stop); root.addEventListener("mouseleave", play);
  root.addEventListener("focusin", stop);   root.addEventListener("focusout", play);
  var tx = null;
  root.addEventListener("touchstart", function(e){ tx = e.touches[0].clientX; stop(); }, {passive:true});
  root.addEventListener("touchend", function(e){
    if (tx==null) return;
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx)>44) go(idx + (dx<0?1:-1));
    tx = null; play();
  }, {passive:true});
  play();
};

CG.fuzzy = function(hay, q){
  if (hay.indexOf(q)>=0) return 2;
  /* light typo tolerance: all chars in order */
  var i=0; for (var c of q){ i = hay.indexOf(c, i); if (i<0) return 0; i++; }
  return 1;
};
CG.openPalette = function(){
  if ($("#palette")) return;
  var el = document.createElement("div");
  el.id = "palette"; el.className="open";
  el.innerHTML = '<div class="pal-bg" data-close></div><div class="pal" role="dialog" aria-modal="true" aria-label="Search">'+
    '<input id="palIn" type="search" placeholder="Search players, teams, games, news, rules…" autocomplete="off" aria-label="Search query">'+
    '<div class="pal-res" id="palRes"></div>'+
    '<div class="pal-foot"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> open</span><span><kbd>esc</kbd> close</span></div></div>';
  document.body.appendChild(el);
  var ix = CG.searchIndex(), sel = 0, results = [];
  function paint(){
    var box = $("#palRes");
    if (!results.length){
      var recent = CG.store.get("recentSearch");
      box.innerHTML = recent.length
        ? '<div class="pal-group">Recent</div>'+recent.map(function(r,i){
            return '<button class="pal-item'+(i===sel?" on":"")+'" data-i="'+i+'" data-route="'+esc(r.route)+'">'+CG.ic("clock",14)+esc(r.label)+'</button>'; }).join("")
        : '<div class="empty" style="padding:26px"><b>Search the league</b><p>Players, clubs, games, news stories, and rulebook sections.</p></div>';
      results = recent.map(function(r){ return { route:r.route, label:r.label }; });
      return;
    }
    var byCat = {};
    results.forEach(function(r){ (byCat[r.cat]=byCat[r.cat]||[]).push(r); });
    var i = 0;
    box.innerHTML = Object.keys(byCat).map(function(cat){
      return '<div class="pal-group">'+cat+'</div>'+byCat[cat].map(function(r){
        var cur = i++;
        return '<button class="pal-item'+(cur===sel?" on":"")+'" data-i="'+cur+'" data-route="'+esc(r.route)+'" data-label="'+esc(r.label)+'">'+
          '<span>'+r.hl+'</span><span class="pi-meta">'+esc(r.sub)+'</span></button>';
      }).join("");
    }).join("");
    var on = $(".pal-item.on"); if (on) on.scrollIntoView({block:"nearest"});
  }
  function run(q){
    q = q.trim().toLowerCase(); sel = 0;
    if (!q){ results = []; paint(); return; }
    results = ix.map(function(r){ return Object.assign({score:CG.fuzzy(r.key,q)},r); })
      .filter(function(r){ return r.score>0; })
      .sort(function(a,b){ return b.score-a.score; }).slice(0,14)
      .map(function(r){
        var pos = r.label.toLowerCase().indexOf(q);
        r.hl = pos>=0
          ? esc(r.label.slice(0,pos))+"<mark>"+esc(r.label.slice(pos,pos+q.length))+"</mark>"+esc(r.label.slice(pos+q.length))
          : esc(r.label);
        return r;
      });
    /* flatten order = category walk order used in paint */
    var byCat = {}; results.forEach(function(r){ (byCat[r.cat]=byCat[r.cat]||[]).push(r); });
    results = Object.keys(byCat).reduce(function(acc,c){ return acc.concat(byCat[c]); },[]);
    paint();
  }
  function open(route, label){
    if (label){
      var rec = CG.store.get("recentSearch").filter(function(r){ return r.route!==route; });
      rec.unshift({route:route,label:label}); CG.store.set("recentSearch", rec.slice(0,5));
    }
    close(); location.hash = route;
  }
  function close(){ el.remove(); }
  el.addEventListener("click", function(e){
    if (e.target.closest("[data-close]")) close();
    var it = e.target.closest(".pal-item"); if (it) open(it.getAttribute("data-route"), it.getAttribute("data-label"));
  });
  $("#palIn").addEventListener("input", function(){ run(this.value); });
  $("#palIn").addEventListener("keydown", function(e){
    var n = $$(".pal-item").length;
    if (e.key==="ArrowDown"){ e.preventDefault(); sel=Math.min(n-1,sel+1); paint(); }
    if (e.key==="ArrowUp"){ e.preventDefault(); sel=Math.max(0,sel-1); paint(); }
    if (e.key==="Enter"){ var on=$(".pal-item.on")||$$(".pal-item")[0]; if (on) open(on.getAttribute("data-route"), on.getAttribute("data-label")); }
    if (e.key==="Escape") close();
  });
  paint(); $("#palIn").focus();
};

  app.innerHTML = '<div class="pg">'+fn(param, qs)+'</div>';
  window.scrollTo({top:0, left:0, behavior:"instant"});
  CG.markActiveNav();

  $$("#app [data-go]").forEach(function(el){

  });

  app.focus({preventScroll:true});
};

  if ((e.key==="Enter"||e.key===" ") && e.target.getAttribute && e.target.getAttribute("data-go") && !e.target.closest("a,button,input,select,textarea")){
    e.preventDefault(); location.hash = e.target.getAttribute("data-go");
  }
  /* focus trap inside open modal/drawer */
  if (e.key==="Tab"){
    var ov = $("#overlay-root .modal, #overlay-root .drawer");
    if (ov){
      var f = $$("a[href],button:not([disabled]),input,select,textarea,[tabindex='0']", ov)
        .filter(function(x){ return x.offsetParent!==null; });
      if (f.length){
        var first=f[0], last=f[f.length-1];
        if (e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
        else if (!ov.contains(document.activeElement)){ e.preventDefault(); first.focus(); }
      }
    }
  }
});

  slides.push({ key:"standings", label:"Standings snapshot", html:
    '<span class="s-cat"><span class="chip chip-chrome">Standings · Week 7</span></span>'+
    '<h2>'+esc(s1.team.name)+' and '+esc(s2.team.name)+' set the pace.</h2>'+
